body:
  text: 民國京口夾山沙門震華編述六六元京師妙善寺尼舍藍藍傳舍藍藍高昌人其地隸北庭風尚好佛故為苾芻者多太祖皇帝龍飛漠北其王率所部以從帝嘉其義處之諸國君長之上待以子壻之禮海都之叛國人南徙師始八歲從其親至京師入侍中宮真懿順聖皇后愛其明敏恩顧尤厚成宗之世事皇太后於西宮以侍從之久勤勞之多詔禮帝師迦羅斯巴幹即兒為師剃染為尼服用之物皆取給於官又視宮官例繼以既廩武宗繼統仁宗以太弟監國師朝夕於太后之側入而侍出而從所言必聽所諫必從眷寵之隆猶子姪焉內而妃主外而王公皆敬以師禮稱曰八哈石北人之稱八哈石猶漢人之稱師也仁宗之世師以桑榆晚景自謂出入宮掖數十餘年凡歷四朝事三后寵榮兼至志願足矣數請靜退居於宮外求至道以酬罔極太后弗聽力辭弗已詔居妙善寺以時入見賜豫之物不可勝紀師以其物創寺於京師曰妙善又建寺於臺山曰普明各置佛經一藏恆業有差又以黃金繕寫番字藏經般若八千頌五護陀羅尼十餘部及漢字華嚴楞嚴畏元字法華金光明等經二部又於西山重修龍泉寺建層閣於蓮池於吐蕃五大寺高昌國栴檀佛寺京師萬安寺等皆貯鈔幣以給然燈續明之費又製僧伽黎衣數百施番漢諸國之僧其書寫佛經凡用金數萬兩創寺施捨所用幣以萬計其積而能散施豫不吝期積福於來生必至於地者皆人所不能也英宗之明以其有靜退之高眷遇尤至每稱之賢以為知幾文宗即位皇太后居中宮以皇妣魯國太長公主愛重於師有兄弟之義尤加敬焉至順三年二月草一日歿年六十四葬南城之陽賜號真淨大師六七元桐鄉福壽寺尼文鑑傳文鑑字古心姓濮氏桐鄉人先世以資雄於鄉生具宿根不樂處俗十四歲即斷葷穢禮廣福淨妙禪師為嗣復參天目中峰本公朝暮請益悟明大法即於濮鎮建大剎請於朝敕賜福壽禪寺仍住持廣福寺兩處開堂廣接來學說法語意平實聞者易解至治庚午歸福壽坐化六八元紹興大慶庵尼智悟傳智悟字了庵福州王氏女幼孤年十一白母願出家因誦維摩經至諸佛國土亦復皆空豁然頓悟往參福州雪峰北山信公信問曰上座甚麼處住師曰不住南臺江邊信曰畢竟住在甚麼處師不審便行信叱曰走作甚麼合喫山僧手中棒師面熱汗下次日復往請益曰某甲昨日祇對和尚有甚麼過信厲聲曰更來者裏覓過在師釋然曰月明照見夜行人信顧旁僧曰看渠根器不凡遂印以偈有相逢若問其中事風攪螺江浪拍天之句後住紹興大慶庵上堂天垂十二闌干角風滿三千世界中熱惱變成清淨境禪心頓覺悟真空靠拄杖有甚共語處上堂大陽門下日日三秋明月堂前時時九夏古人怎麼道未免坐在者裏大慶即不然山轉疑無路溪回別有村上堂柳絮飄風杏華沐雨好箇生機快須薦取以拂子擊禪牀曰咄三十年後不得錯舉六九元黃巖接待庵尼覺真傳覺真號竺心黃巖濠頭丁氏安人也初見絶田耕於委羽山有省入遂棄家築室自居復參涌泉古愚泉曰良家子女東奔西走作麼真曰特來拜和尚泉曰者裏容你不得真乃拍手一下曰三十年用底今朝捉敗泉便休去往鴈山春雨庵謁無際才入門便曰春雨如膏行人惡見泥濘際曰不是不是真擬進語被際喝出晚年就邑中明因寺側開接待一僧提包笠直入臥內真問是甚麼僧曰行腳僧真遽指其足曰草鞋𦄍斷為甚不知僧無語真便將包笠擲出曰者裏無汝措足處一日明因奎禪師相看真曰聞說長老夜來生得兒子是否明曰且道是男是女真曰雞銜燈盞走鱉咬釣魚竿七元燕京藥師庵尼性悅傳性悅蒙古人姓高麗氏為中書平章闊闊歹之側室有賢行平章死誓不二適正室子拜馬朵兒赤說其色欲妻之而不可得乃以其父所有大答納環子獻於太師伯顏此物蓋伯顏所屬意者伯顏喜問所欲遂白前事伯顏特為奏聞奉旨命拜馬朵兒赤收繼小母高麗氏高麗氏夜與親母踰垣而出投藥師庵削髮為尼伯顏怒以為故違聖旨拜奏命省臺洎侍正府官鞫問諸官奉命惟謹鍛鍊備極慘酷性悅無他言惟持觀音聖號不絶口速求其死時國公闊里吉思於鞫問官中獨秉權力侍正府都事帖木兒不花數致語曰誰無妻子安能相守至死得有如此守節者莫大之幸而反坐以罪恐非我治朝之盛典也國公悟為言於伯顏之前宛曲解釋其事遂已性悅自慶更生堅發道意奉大士尤虔凡蔬果糖餞必先至誠獻供而後始食年垂七十入寂七一元杭州西天目山尼普貴傳普貴字無為因夫主忠愍公使日本死於王事即盛年斷髮為尼躬參高峰和尚於杭之天目得其性妙之旨隨宜說法皆成妙諦好拈頌古德機緣極為人所愛誦至治二年七月朔趺坐而逝闍維之獲五色舍利斫石為窣堵葬焉其男名都中為兩浙漕使轉福建道都元帥一日奠於筵有折山丹花於瓶者俄結一物如杯玉雪瑩然人咸異之七二元杭州西天目山尼楊妙錫傳附梅花尼傳楊妙錫宋宮人也奉老子教為女冠居錢塘與中峰和尚族鄰初和尚不願處俗父母患之楊識和尚非凡器諭其父母令出家及和尚祝髮又助僧牒衣具且求所祝之髮少許貯以香函供於靜室越數年有舍利生於髮久而益多積至五十餘顆五色晶瑩楊自是易所學以學佛乞為比丘尼終焉元統甲戌冬屬僧月指者塔髮舍利於雲居庵時有梅花尼者失其名學道懇掣遍訪知識凡歷數十年迄無所獲一日偶見梅花開放豁然大悟述偈曰盡日尋春不見春芒鞋踏遍嶺頭雲歸來笑撚梅花嗅春在枝頭已十分蓋見性語也七三元某縣長明庵尼妙湛傳妙湛大德間人管夫人有長明庵圖庵居曠野垣內有屋三層橫廊通門徑豎杆懸一燈所謂長明也旁有石蓮台作施鳥食者垣外二長松下蔭又一樹參之門外坡臨水際水間復有坡樹墨氣高古無兒女子態夫人欵云大德九年冬十一月草五日仲姬管道升作有比丘尼妙湛詩云雙樹陰陰落翠巖一燈千古破幽關也知諸法皆如幻甘老煙霞水石間小行書題其上妙湛想即庵畫中人也七四明沙縣某庵尼常淨傳常淨沙縣歷東民家女也俗姓徐氏鞠於富氏洪武間主翁歿以遺孤託焉常淨撫之長盡歸所遺資乞為尼梵行精篤持咒能通冥感知人休咎一日盜將至常淨戒侍者具齊供若干席頃之盜至齊供適與人數合相顧失色不敢犯而去由是道德益彰諸善女人之學佛者繞座歸依請示法要如入寶山各自稛載而歸淨清貧自守崇儉黜華身先衆役不以為勞諸弟子輩皆凜遵教誡不敢放逸至年九十始坐化七五明安東吉祥庵尼寂性傳寂性鹽城劉姓女少為尼得遇名師指點悟心要法以遊戲神通化行諸方嘗乞食安東市不舍風雨或祁寒浴於河人初以為狂無食之者常握瓦礫遇事卜之逆知吉凶所到之家可入乃入人遂敬而信之得以一入門為幸舉市呼曰老佛有以開示請者出言似甚平泛味之有至理後坐化吉祥庵世傳其偈云奉勸學道人學道要認真如若心不切苦海永沉淪又云大地浩無邊衆生多難數幾個聰明人跳出輪回苦七六明莒州某庵尼悟蓮傳悟蓮姓夏氏名雲英山東莒州人幼聰慧五歲能誦孝經七歲讀佛經法華楞嚴皆能成熟年十三選為周世子宮人世子即位是為憲王元妃呂氏薨遂專內政國有大事多與裁決憲王嘗令作詩吟鶻悟蓮以針進勸王推廣德心勿畜此以傷生類也年二十二有疾求為尼受菩薩戒習金剛密乘不二載洞明內典其詩清峭人爭傳誦立秋云秋風吹雨過南樓一夜新涼是立秋寶鴨香消沉火冷侍兒閒自理空侯雨晴云海棠初種竹新移流水潺潺入水池春雨乍晴風日好一聲啼鳥過花枝秋夜即事云西風颯颯動羅幃初夜焚香下玉墀禮罷真如庭院靜銀缸高照看圍棋永樂十六年六月作偈示衆吉祥而逝年二十有四有法華經讚七篇及清端閣詩卷行世七七明蕭山某庵尼無為傳無為蕭山來氏女幼誓不嫁蔬食念佛年二十剃髮結茅專修淨土三十游方參學凡所歷處有病苦者隨物取與煎湯服之即愈嘉靖間宮中時疫流行風聞於朝召赴有驗賜無為心禪師之號送歸故廬將終日有神僧投宿無為卻之再三神僧勸誡而進權宿禪牀睡醒不見知是神僧便起坐說偈云六十四年活計得箇菩提三昧今朝撒手歸西依然明月滿地即逝荼毗一團舍利塔于冠山七八明杭州孝義庵尼袾錦傳袾錦字太素姓湯杭州人歸同邑沈生即蓮池宏公是也宏公出家時錦年僅十九或勸錦阻之錦曰熟聞渠稱生死事大阻之是誤渠也不可至年四十七亦出家改所住為孝義庵效宏公七筆勾以為婦女學佛者勸其詞曰紡績綢繆作讀晨昏用意周夫若成名後富貴同享受嗏霞佩甚優悠珠冠在首一旦無常敕命難相救因此上把鳳誥鸞章一筆勾金玉雕縷珠翠輝煌插滿頭綾錦裁宮袖紅紫佳文秀嗏誰道眼前漚纓絡難受包裹骷髏送入量人斗因此上把錦繡妝奩一筆勾早上妝樓先把青絲理不休梳掠香風透前後分三綹嗏鴉鬢黑油油端的蓬鬆美貌終成醜因此上把霧髻雲鬟一筆勾月閉花羞美貌方才誇女流畫眉春色就唇點硃櫻溜嗏鏡裏活骷髏多方妝就老去顏衰死後皮囊臭因此上把香粉花脂一筆勾織錦藏頭針指工夫巧且優花樣隨時候做出如生就嗏翦翠把春留天生妙手死後歸空色色成虛謬因此上把刺繡挑花一筆勾懷孕耽憂分娩如同地獄遊乳哺三年久疾病常相守嗏婚嫁未曾休母先衰朽孝順多端替死誰能夠因此上把育女生男一筆勾羅襪雙鈎湘水裙拖八幅秋步步凌波皴側側弓鞋瘦嗏高低鳳凰頭無限嬌羞如此規模難向西方走因此上把緩步金蓮一筆勾受具後制行謹嚴萬曆四十二年得疾垂絶時忽語侍者云經稱十念往生亟扶我起起則正坐念佛而逝年六十七七九明杭州孝義庵尼廣覺傳廣覺直隸崇明縣龔氏女父一夔別號夢萱鄉之碩德君子也母施氏生覺於萬曆乙卯甫年十二不茹葷從妹廣曜者相與習經咒朝夕禮佛惟謹自誓貞不字父母諸宗人難之多方勸諭不能奪二十八剃染是年偕其妹隨仲父至庵先是夢萱公語及孝義庵之勝覺遂大喜躍遂委身依止焉曩覺之在室也事父母如事師逮其出家也事孝義庵主如事父母精持梵行純一不雜遠邇瞻慕崇明之人因而感化發心者不可數計然稟質孱弱刻心苦躬勞不自惜俄得疾久之卻醫藥一心待盡夢萱公聞女病偕母來省則曰吾昔落髮於尼師不愜吾願乃特畜周羅而告雲棲曰最後一著惟師斷之佛制也棲允諾自是無他語氣懨懨不絶如線忽起正面趺坐曰願見庵主庵主至合掌稱謝言別次為設彌陀接引尊像則怡然現笑凝目諦觀合掌皈命已而索水盥手著新淨衣持數珠端身對佛如入禪定侍疾者慮或傾仆以二枕將左右掖之揮手云無用此衆環繞助念復揮手云吾自有主在毋勞衆也跏趺不動凡二晝夜有奇微聲念佛聲漸盡泊然而逝時萬曆辛亥二月七日出家六夏世壽三十有二八明蘇州寒山庵尼竺禮傳附崇範傳竺禮姓葉氏蘇州東洞庭人幼納周聘周子無行禮泣曰忍以此身自污耶誓死不與成禮久之周子死父母欲改適又泣曰忍以一身許二姓耶欲引決父母彊之乃祝髮為尼又崇範姓賀氏聘於張將成禮夫卒範曰吾已心許之不可不成禮遂服衰麻以往撫棺慟哭持喪三年畢亦為尼與竺禮並居寒山庵二人自力衣食戒行凜然年並八十餘而卒八一明永明回龍庵尼慧秀傳慧秀姓余氏其夫江西奉縣人家於永明業陶夫喪遂茹素修行日誦觀音大士千遍既懇求地主丈尺地立回龍庵奉佛晝勤紡績夜龕坐念佛所居地無泉慧秀以杖叩地忽石邊鏗然有聲命弟子開之有泉湧出味殊甘美遂成流澗能蔭數百畝四時不涸邑人以為苦修之驗爭向慕供養之慧秀生於弘治甲午距萬曆甲戌壽百歲有奇八二明南都法華庵尼覺清傳覺清婺源蔡氏女出家南都法華庵讀誦經典熏修不懈庵小而貧清日種植園蔬自食其力嘉靖中有湛甘泉霍渭崖者不信三寶衊視僧尼命士卒拆毀庵觀破損佛像境內大小伽藍皆不能免清知厄運當前無法挽回乃率徒衆遠避瀕行題詩於壁云急忙簡點破袈裟收拾行囊沒一些袖拂白雲歸洞口肩挑明月繞天涯可憐松頂新巢鶴卻負籬根舊種花再四叮嚀貓與犬休教流落俗人家按宋秦丞相檜以祁門東松僧與嶽將軍飛有舊密遣人圍寺執之僧能前知題前詩於壁而去事詳補續高僧傳蓋覺清録之以曉悟當道者而列朝詩集竟指為覺清作殆失於考也八三明歸德水晶庵尼獨目金剛傳獨目金剛萬曆間人住歸德府城外之水晶庵因嘗以金剛為業失一目故以名此天性淡薄自糲食粗衣外人有所遺盡分贍僧尼之不給者每開期會講善信環集一士子問曰金剛經何以有三十二分答曰一以貫之儒佛皆然何得許多段落說偈曰佛說金剛妙出群一言了悟絶聲聞有人解得金剛旨四八何須逐段分一僧問曰何以謂之金剛答曰金剛人皆有的何須恁般問說偈曰金剛果信是金剛百鍊千捶永不傷粉碎虛空些子走祇今惟見佛毫光又有人曰師通曉佛義何以不現男身答曰形有男女性無彼此莫作差等觀說偈曰男女何須辨假真觀音出現果何人皮囊脫盡渾無用試問男身是女身隨問隨應靈敏異常遠邇皈依者無算年踰七十預示化期鼻端有火危坐瞑然而逝示一偈云荼毗一去永歸空著處尋常便不空我去我來仍是我電光泡影一般同八四明常州楞伽庵尼慧貞傳慧貞常州宦族之女自幼言動不妄願出家父母聽之送入楞伽庵遂朝夕持誦金剛經有同庵尼以穢事敗波及貞時適患目因憤恚俱瞽如是三載誦經如故一夜夢金剛神謂曰汝行無虧當還爾明兩目忽開歷年九十無疾坐化按昔崔相公群問如會禪師曰師以何得曰見性得師方病眼公訊曰既云見性奈眼何師曰見性非眼眼病何害此尼雙瞳再朗特明持驗不爽若論得道不在有眼無眼八五明廣州總持庵尼成慈傳成慈字戒芻番禺沙灣人俗姓何生而敏傑不類群嬰五歲即不茹葷羶親知非俗所留遂送女庵中事佛執勞無憚多覺少寐年既漸長立志堅貞執行持心不徇餘情聽講思義穎悟異人崇禎庚辰歲年四十有一始得剃染時有尼衆甚希故滯年稔矣從受具來專攻律藏研究性遮故得持犯炳然戒德冰雪而靈根宿發趣向高邁志在大乘利人為急深厭有漏欲釋形拘嘗聞西方下品生者劫數乃得見佛皆非己志欲再生世間親近知識又疑隔陰之昏雖得人身貪瞋易染況末劫知識難值未免退墮忽一日閲藏經見有上生兜率內院親覲彌勒菩薩一生即便見佛聞法無有遲速之品階遂堅志上求因請鼎湖弘贊律師決曰上生宗旨可得聞乎律師嘉其志趣遂授與上生經一卷成慈懇請講釋律師乃按經示以依正宗趣成慈退而依經作觀持名不輟心口體雖多病精爽過人素好坐禪脅罕著席後住廣州總持庵約徒甚嚴順治丙戌四月望日告病越五月十七日午時忽於坐定中見一菩薩侍人忘其名倏然引至兜率內院覩種種莊嚴光明耀目慈氏菩薩相好難述成慈遂舉身敬禮禮已白云願世尊攝受大士告曰汝卻後七日來生此處又於二十一日坐靜中忽覩慈氏菩薩現在其前自見己身成童子相即趨下禪牀拜求攝受次日告諸來問疾者曰我明日行矣當留步送吾上山荼毗云云翌日午時喚衆稱彌勒如來名寂然而逝壽四十七歲八六明廣州真梵庵尼成靜傳成靜字實修廣州古岡人俗姓張幼持齊戒以貞潔自處禮本邑真梵庵主為師及剃落專課涅槃大乘諸經事師尤謹中年進具常以毗尼請益於弘贊律師栖心淨土彌陀不輟於心口慈詳好施威儀範物循循善誘為士庶所仰嘗勸衆造旃檀千手眼大悲聖像於鳳城之大慈庵越明年得微疾預知時至頻誨徒衆與諸檀越訣別翌日語諸弟子曰千手千眼大悲觀音菩薩來此相接汝等合恭迎之吾往矣即瞑目而化世壽五十有九八七明山陽紫竹庵尼悟道傳悟道字步虛鹽城郭氏女幼許字人笄年誓不適遂出家於山陽車橋鎮紫竹庵繼遷於涇溪南岸清修苦行嚴護律儀過午食不進口志期淨土勤課佛號念已而拜拜已復念四威儀中幾無間斷終年雖不鉗關然常禁足里人罕睹其貌共以化菩薩呼之道生於萬曆二十四年丙申卒於順治二年乙酉得年五十蜀進士吳允謙為撰塔銘塔建庵側
