body:
  text: 民國京口夾山沙門震華編述一梁湖州法華寺尼道迹傳道迹一名明練號總持吳興人或作梁武帝女事達摩為弟子悟心要法達摩將返天竺命門人各言所得道迹曰我今所解如慶喜見阿閦佛國一見更不再見達摩曰汝得吾肉後遁居湖州辨嶺峰晝夜誦法華經誦滿萬部不下山者凡二十年感空中白雀常來聽經山遂以白雀名既圓寂塔全身於結廬之所大同元年塔內忽有青蓮華一朵道俗異之啓視見華從舌根生州郡録奏敕建法華寺事具褚詢望所寫塔碑二梁揚州某庵尼僧法傳僧法太學博士江泌女小而出家年八九歲有時靜坐閉目前後誦出二十一經合三十五卷揚州僧俗咸稱神授茲列經目於後淨土經七卷妙莊嚴經四卷妙音師子吼經三卷益意經三卷阿那含經二卷寶頂經一卷正頂經一卷法華經一卷勝鬘經一卷藥草經一卷太子經一卷伽耶婆經一卷波羅奈經一卷優婁頻經一卷般若得經一卷華嚴瓔珞經一卷出乘師子吼經一卷踰陀衛經一卷優曇經一卷維摩經一卷序七世經一卷費長房編入三寶紀中且推論之曰房驗經論斯理皎然是宿習來非關神授且據外典夫子有云生而知之者聖學而知之者次此局談今生昧於過去爾若不爾者何以得辨外內賢聖淺深過現乎三梁宜都紫竹庵尼太清傳太清宜都人出家學道深得理味住紫竹庵日夕誦經資為行業庵臨溪側一日溪水暴漲太清大笑擲蒲團於水中趺坐其上誦普門品順流由長陽江出大江而去莫知所之因名其溪曰師姑溪四陳高郵某庵尼華手傳華手梁普通二年居高郵某庵志節冰霜誦妙法蓮華經不捨晝夜適通第一右手爪上即生一華形如菱菜如是誦五卷五指爪上生於五華次誦第六第七掌內又生二華形大於前州境內因呼為華手尼尼亦無甚苦節陳武帝召見看之大為嘉敬後不知所終五北齊五臺祕魔巖尼法祕傳法祕北齊人慧心天悟真志獨拔居五臺山西臺專修禪慧木食澗飲行苦自持積五十年未嘗下山年餘八十始寂後人重其道名其住處曰祕魔巖謂高尼法祕煉魔地也唐有祕魔和尚得馬祖之道擎叉接人亦以住此而名六隋同州般若寺尼智仙傳智仙蒲坂劉氏女少出家有戒行和上失之恐其墮井見在佛屋儼然坐定時年七歲遂以禪觀為業隋文帝誕日無因而至語太祖曰兒天佛所祐勿憂也尼遂名帝為那羅延言如金剛不可壞也又曰此兒來處異倫俗家穢雜自為養之因割宅為般若寺內通小門以兒委尼不敢名問後皇妣來抱忽見化而為龍驚遑墮地尼曰何因妄觸我兒遂令晚得天下及年七歲告帝曰兒當大貴從東國來佛法當滅由兒興之而尼沈靜寡言時道成敗吉凶莫不符驗初在寺養帝年十三方始還家積三十餘歲略不出門及周滅二教尼隱皇家內著法衣戒行不改帝後果自山東入為天子重興佛法皆如尼言及登祚後每顧群臣追念阿闍黎以為口實又云我興由佛法而好食麻豆前生似從道人裏來由小時在寺至今樂聞鐘聲乃命史官王劭為尼作傳其龍潛所經四十五州皆悉同時為大興國寺因改般若為其一焉仁壽元年帝及后宮同感舍利並放光明砧磓試之宛然無損遂散於州部前後建塔百有餘所隨有塔下皆圖神尼多有靈相故其銘云維年月菩薩戒佛弟子大隋皇帝堅敬白十方三世一切三寶弟子蒙三寶福祐為蒼生君父思與民庶共建菩提今故分布舍利諸州供養欲使普修善業同登妙果仍為弟子法界幽顯三途八難懺悔行道奉請十方常住三寶願起慈悲受弟子等請降赴道場證明弟子為諸衆生發露懺悔文多不載七唐河東某庵尼法信傳法信字練行河東人常誦法華經武德初為靜室數倍酬直倩人書全經七卷一起一浴八年乃畢供養嚴重龍門僧法端聞之心竊窺羡欲索為講本法信辭不獲已割愛與之然非所願也及開函展讀唯見黃紙了無文字法端慚惶無措遣使送還法信疑有觸污遂至如此乃對本悲泣頂戴行道至七晝夜未嘗間斷既而開視文字如故八唐潯陽某庵尼妙空傳妙空潯陽人蔬食紙衣少欲知足平居專讀法華意至懇切乃至不受餘經一偈常發願畢此形骸往生極樂默觀內照深解念佛三昧臨終之時有紫雲覆室異香遍於一縣後弟子尼夢言一生持法華功德所積得生極樂上品中生若兼解義趣必高登上品上生矣九唐汾州西河尼大明傳大明汾州人遇道綽禪師講無量壽經得知念佛法門居西河誓生淨土每入室禮念先著淨衣口含沉香攝靜課誦三四年間相續不斷將終之日衆忽聞澄香滿室俄而光明如雲隱隱向西沒焉一唐荊州姊妹二尼傳姊妹二尼荊州人貞觀初同誦法華深厭形器俱欲捨身求無上道從此漸斷粒食服諸香油預告道俗克日焚然即於城大街置二高座以蠟布纏身唯出面目誦法華至藥王品姊先以火炷妹頂妹即以火炷姊頂清夜兩炬炳耀同輝火沿至眼經聲尚明至於明旦合座同燒骨肉並銷二舌俱在衆為起塔以旌萬世一一唐綿竹淨惠寺尼信相傳信相綿竹楊氏女生而知道終日凝然禪寂父為道士號三洞先生弟惠寬為僧居龍懷寺初楊族家世奉道相寬獨相偕學佛見天尊像不肯跪拜父母雖詬詈之亦不屈從日惟互相談論俱非世事父母怪異使人録其所論言句蓋大莊嚴等論也相與驚歎宿根改宅為淨惠寺自亦奉佛聽信寬一時剃落寬出家已神異日顯俗呼聖和上相悟解甚深凡情莫測嘗因淨惠寺異僧入定滿寺紅焰亘然而人未識之相曰此火聚尊者入火光三昧耳因入其寺自入水觀一室湛然唯水不見其形異僧欽歎以為得果時亦號聖尼一二唐長安積善寺尼淨真傳淨真住長安積善寺衲衣乞食一生無瞋誦金剛經十萬遍專精念佛顯慶五年染疾告弟子云五月內十度見阿彌陀佛兩度見極樂世界寶蓮華上童子遊戲又有聖僧五度授記曰我當作佛又曰吾得上品往生跏趺而終經宿卻醒語弟子曰吾得菩薩位也遍歷十方供養諸佛言訖而終光照於寺一三唐長安濟度寺尼法願傳法願俗姓蕭氏蘭陵人梁武帝之六葉孫唐故司空宋國公瑀之第三女也乘因敻劫植本遐生孕月仙姿稟清規於帝渚儀星寶態降淑範於台門襁褓之辰先標婉質髫齓之歲遽挺柔情聰悟發於生知孝友基乎天縱中外姻族莫不異焉加以骨象無儔韶妍獨立鉛華不卸彩絢春桃玉顏含澤光韜朝蕣年將十歲頗自矜莊整飾持容端懷撿操每留神於鞶帨特紆情於紝組瓊環金翠之珍茵簟衾幬之飾必殫華妙取玩閨闈麗而不奢盈而不溢既而疏襟學府繹慮詞條一覽而隅隩咸該再覿而英華畢搴豪飛八體究軒史之奇文法兼二妙符衛姬之逸迹群藝式甄女儀逾劭宋公特深撫異將求嘉世載佇孫龍以光宋鯉而嚴庭垂訓早沐慈波鼎室承規幼明真諦飄花見雪初陪太傅之歡摘葉為香遽警息慈之念爰發宏誓思證菩提懼塵情於六禮乃翹誠於十誦承間薦謁請離俗緣宋公論道槐端丹青神化虔襟奈苑梁棟正法重違雅志許以出家甫及笄年爰披法服乃於濟度伽藍別營禪次庭標雁塔遠蔑娀臺藏寫龍宮遙嗤魯館於是沿空寂念襲慧薰心悅彼糞衣俄捐綺縠甘茲蔬膳遽斥膻腥戒行與松柏齊貞慧解共冰泉等徹超然拔類恬然宴坐若乃弟兄辦供親眷設齋九乳流音六銖含馥瓶錫咸萃冠蓋畢臻唯是瞻仰屏惟遙申禮謁自非至戚罕有覿其形儀者加以討尋經論探窮閫域核妒路之微言括毗尼之邃旨至於法華般若攝論維摩晨夕披誦兼之講説持戒弟子近數十人莫不仰味真乘競趍丹枕傍窺淨室爭詣元扉肅肅焉濟濟焉七衆之仰曇彌何以尚也重以深明九次閲想禪枝洞曉三空澄襟定水厭此纏蓋忽現身疾大漸之晨謂諸親屬曰是身無我取譬水萍是身有纍同夫風葉生死循環實均晝夜然則淨名申誡本乎速朽能仁垂則期於早化金棺乃示滅之機玉匣豈棲神之宅誠宜捐軀鷙鳥委形噬獸斂襟正念奄然無言粵以龍朔三年八月草六日捨壽於濟度寺之別院春秋六十三姊弟永懷沉痛不忍依承遺約乃以其年十月十七日營空於少陵原之側無名氏為撰墓志銘曰智有殊稱法無異源爭驅意馬俱制心猿志擾情紊神凝理存展如淑範獨趨玄門璇彩星分瑤姿月舉含芳槐路疏貞桂序雲吐荊臺霞霏洛渚學兼班媛詞彬蔡女奠禽匪志救蟻昭仁捐華台室沐道玄津法關開揵心衢屏塵九流遣纍八定栖真忍藥分滋戒香含烈傳燈不倦寫瓶無竭奄愴神遷空悲眼滅式鐫柔範終天靡絶一四唐長安道德寺尼無量傳無量長安閔氏女年甫十八能誦華嚴永淳二年有詔度僧其家男女五人俱以試經得度無量配住道德寺志節彌堅每誦華嚴三日一遍以為恆課六時禮懺三業無替每見諸貧病莫不深思悲愍資給湯藥扶其困乏時歎為女中丈夫一五唐蘇州混山尼傳混山尼失其名住蘇州混山縣界少小入道常誦法華經每日兩遍二十餘載曾無懈廢此尼容貌妍詳見者思戀至永昌元年縣録司姓朱遂起惡心橫加非望尼雅志貞確意不從之朱乃惱亂寺衆破壞常住尼等不知何計得免斯苦持經尼云此法華經無上妙寶諸天鬼神共所護持佛語真實何無靈驗作是念已即著淨衣入佛殿燒香發願其後録司假託別由而來寄宿心懷異意方欲向尼房去少選之間忽覺半體酸痛男根遂落遍身流汗即發癩瘡眉毛鬢鬚一時俱墮録司感斯惡報生大怖畏狂心頓歇立命歸返悲悔萬方竟不痊損尼見一念之誠蠲諸魔礙益堅道意畢命行持一六唐長安宣化寺尼堅行傳堅行俗姓魚氏京兆府櫟陽人也生平貞儀苦節精勤厥志捐別修而遵普道欽四行而造真門豈荼晨霜易晞夕露難久寢疾牀枕藥餌無徵以開元十二年十月草一日遷化於宣化寺春秋七十有六夏卌矣臨命遺囑令門人等造空施身至開元草一年親弟大雲僧志叶弟子四禪賢首法空淨意等收骨起塔以申仰答罔極之志並為之銘云一七唐長安興聖寺尼法澄傳法澄字無所得俗姓孫氏樂安人也吳帝權之後祖榮涪州刺史父同同州馮翊縣令法澄第二女降精粹之氣含宏量之誠大惠宿持靈心早啓鑒浮生不住知常樂可依託事蔣王求為離俗遂於上元二年出家威儀戒行覺觀禪思迹履真如空用恆捨遂持瓶鉢一十八事頭陀山林有豹隨行逢神擁護於至相寺康藏師處聽法探微洞悟同彼善財調伏堅持寧殊海意康藏師每指法澄謂師徒曰住持佛法者即此師也如意之歲淫刑肆逞巫及法師收扶汝南謀其義舉坐入宮掖故法澄於是大開聖教宣揚正法歸投者如羽翮趨林藪若鱗介赴江海昔菩薩化為女身於王後宮説法今古雖殊利人一也中宗和帝知名放出中使供承朝夕不絶景龍二年大德三藏等奏請法澄為紹唐寺主敕依所請玄宗在春宮幸興聖寺施錢一千貫充修理寺以法澄德望崇高敕補為興聖寺主法澄修葺畢功不逾旬月又於寺內畫華嚴海藏變造八角浮圖馬頭空起舍利塔皆法澄指授規模及造自餘功德不可稱數融心濟物遍法界以馳神廣運冥力滿虛空而遇化不能祇理事途請解寺主遂鈔華嚴疏義三卷及翻盂蘭盆經溫室經等專精博思日起異聞疲厭不生誦經行道視同居士風疾現身乃臥經二旬飲食絶口謂弟子曰我欲捨壽不知死亦大難為當因緣未盡後月餘儼然坐繩牀七日不動惟聞齋時鐘聲即喫水忽謂弟子曰扶我臥我不能坐死臥訖遷神春秋九十開元十七年十一月三日也以其月二十三日安神於龍首山馬頭空塔所弟子嗣彭王女尼彌多羅等念其師仁孝幼懷容儀美麗講經論義應對如流王公等所施悉為功德恐人事隨化陵谷遷移遂請彭王志暕銘其塔一八唐長安安國寺尼持法傳附慧忍空姑傳持法晉陵黃氏女與其妹慧忍同稟宿根幼聞人誦法華聽之曰吾解此義也試使之説能深談實相之旨後入京師安國寺為尼同修法華三昧忽有尼號空姑詞貌甚異來共止宿每至中夜身光赫然如是三年而去或問之二尼皆笑而不答人謂其為普賢也一行禪師聞之亦加欽敬一九唐長安濟度寺尼惠源傳附慈和傳惠源俗姓蕭氏南蘭陵人也曾門梁孝明皇帝大夫諱瑀唐中書令尚書左右僕射司空宋國公父諱釴給事中利州刺史紛綸葳蕤奕世名家原師之始誕也惠音清越間氣沖亮稟天真於太和集神祐於純嘏及數歲後養必申敬動皆合理發迹有道出言有章屏金翠而窒其繁華絶葷羶而割其嗜欲超然戰勝但思出家天鑒孔明精心上感年二十二詔度為濟度寺尼如始願也受戒和上寺大德尼道之崇也羯磨闍黎太原寺大德律師薄塵法之良也迪延師立證登壇進律僧夏歲潔戒珠日明奉以周旋不敢失墜先是其姑法願亦出家濟度寺卒時師始二歲初師才至九歲遘先大夫之酷草有七執先夫人之夏皆泣血茹哀絶漿柴毀古之孝子烏足道哉每秋天露下衰林風早棘心欒欒若在喪紀不忘孝也亦能上規伯仲旁訓弟姪嗈嗈閨門俾其勿壞則天倫之性過人數級夫其內炳圓融外示方便恂恂善誘從化如流亦猶師子一吼魔宮大隤則感激有如此者行住坐臥應必皆空慈悲喜捨用而常寂黃裳元吉清風穆如則龜鏡有如此者後遇高僧義福者常宴坐清禪止觀傳明殊禮印可又有尼慈和者世莫之識知微通神見色無礙時人謂之觀音菩薩嘗於大衆中目師曰十六沙彌即法華中本師釋迦牟尼之往號也非師心同如來孰能至于此而更精承密行親佩耿光十數年間演其後事他日師厭世示疾以開元草五年秋九月二日從容而謂門人曰死生者天之常道身沒之後於少陵原為空遷吾神也言卒右脅而臥怡然歸寂享年七十有六即以十一月旬有二日從事於空遵理命也倉曹參軍楊休烈撰故大德比丘尼惠源和上神空志銘銘曰猗那明行足不復還至人去兮逍遙天地之間二唐洛陽安國寺尼惠隱傳附德傳惠隱俗姓榮京兆人其家第四女也族望北平曾祖權隨金紫光祿大夫散騎常侍兵部尚書東阿郡開國公祖建緒銀青光祿大夫使持節息始洪諸軍事三州刺史東阿郡開國公叔祖思九黃門侍郎父懷節夷州綏陽縣令外祖韋氏字孝基皇中書舍人道遙公之孫也師聰識內敏幼挺奇操粵自齠齓敬慕道門專志誦經七百餘紙業行精著簡練出家自削髮染衣安心佛道尋求法要歷奉諸師如説修行曾無懈倦捐軀委命不以為難戒行無虧冰霜比潔或斷穀服氣宴坐安禪或鍊辟試心以堅其志動靜語默恆在定中凡所施為不輟持誦雖拘有漏密契無為雅韻孤標高風獨遠嗚呼驚波不息隟影難留生滅無恆遽隨遷謝開元二十二年七月十一日壽終於安國道場春秋七十有六右脅而臥奄然滅度臨涅槃時遺曰吾緣師僧父母並在龍門可安吾於彼處與尊者同一山也弟子尼圓德博通三藏才行清高生事竭仁孝之心禮葬盡精誠之志追痛永遠建塔茲山縱陵谷有遷庶芳徽不朽無名氏為之銘曰至道希夷代罕能窺探祕究妙夫惟我師爰自齠年訖于晚歲精念護攝虔誠不替肅肅戒行明明定慧淨業滋薰與佛同契逝川不駐隟駟難留奄隨運往萬古千秋嗟永感而無極式雕紀於芳猷二一唐韶州曹侯村尼無盡藏傳無盡藏韶州曹侯村人儒士劉志略之姑初六祖自黃梅得法回行抵村人無知者劉志略禮遇獨厚無盡藏常誦大涅槃經六祖暫聽即知妙義遂為解説無盡藏乃執卷問字六祖曰字即不識義即請問無盡藏曰字尚不識焉能會義六祖曰諸佛妙理非關文字無盡藏驚異之遍告里中耆德云此是有道之士宜請供養有魏武侯玄孫曹叔良及居民競來瞻禮時寶林古寺自隋末兵火已廢遂於故基重建梵宇延六祖居之俄成寶坊二二唐藤州通善寺尼智首傳智首不知何許人出家學法通曉毗尼住藤州通善寺攝化道俗多所啓悟時有日本僧普照榮睿入唐求法懇請揚州大明寺鑒真律師東渡傳律律師愍其為法心誠率弟子多人六次開纜皆遇難緣折回最後七次於天寶十二載又結四十一人橫渡滄溟智首與同輩三人亦隨法輿而往冀以大法化彼女衆雖其餘道迹湮沒不彰然以愛道孱弱之軀而能犯萬里鯨波投身異域建立法幢其志節已足多矣二三唐溫州淨居寺尼元機傳元機瑞安人姓戴氏乃永嘉大師女弟景雲中得度常習定於大日山石窟中一日忽念曰法性湛然本無去住厭喧趨寂豈為達耶乃往參雪峰峰問甚處來機曰大日山來峰曰日出也未機曰若出則鎔卻雪峰峰曰汝名甚麼曰元機峰曰日織多少機曰寸絲不挂遂禮拜退才行三五步峰召曰袈裟角拖地也機回首峰曰大好寸絲不挂即於言下契悟後住溫州淨居寺倒立而化永嘉喝曰汝生也顛倒死也顛倒乃仆殯後一夕大雷電柩忽不見尋之則在大日巖竇因名其巖曰機巖二四唐寶應河壖尼真如傳真如鞏縣人姓李氏嫁於賀若氏捨俗為尼唐天寶元年七月七日真如於所居精舍盥濯忽有五色雲自東來雲中引手不見其形以囊授真如曰寶之慎勿言也天寶末安祿山之亂真如展轉流寓於楚州安宜上元二年建子月十八日夜忽見二人皂衣引真如東南行可五六十步樓觀精飾兵衛嚴肅皂衣者曰化城也殿上一人衣碧衣戴寶冠稱天帝有二十餘人衣冠亦如之呼為諸天命真如進諸天相謂曰下界殺戮過多腥穢達於諸天當以神寶壓之一天曰用第三寶又一天曰今沴氣方盛三寶不足以勝須以第二寶授之曰然因出寶授真如曰汝往令刺史崔侁進於天子前所授小囊有五寶人臣可見今八寶惟王者得見慎勿易也具以寶名及所用之法授真如復令皂衣者送之翼日真如詣縣以狀聞刺史以為妖令從事盧恆就訊真如以囊中五寶示恆出寶盤照之光耀射日仰望不知所極恆異之白於侁聞之節度使崔圓圓召真如詣府欲歷視之不可固強之真如不得已乃出八寶置之日中則白氣貫空措諸陰室則照燭如月侁遣盧恆隨真如上獻時肅宗寢疾召太子謂之曰汝自楚王為儲嗣今獲寶於楚州天賜汝也代宗拜受賜因改元寶應以安宜縣為寶應縣賜真如寶和大師敕長安立寶應金輪寺真如所居得寶地在河壖景物暢茂相傳西域賈人過其旁者莫不望而瞻禮焉二五唐長安某庵尼功德山傳功德山姓氏住處失詳道行顯著能前知肅宗朝屢入宮為后妃説法代宗廣德元年吐蕃犯便橋上幸陝王師不利常有紫氣如車蓋以迎馬首及回潼關上嘆曰河水洋洋送朕東去上至陝因望鐵牛蹶然謂左右曰朕年十五六宮中有尼號功德山言事往往神驗屢撫吾背曰天下有災遇牛方回今見牛也朕將回爾是夜夢黃衣童子歌於帳前曰中五之德方峨峨胡胡呼呼可奈何詰旦上具言其夢侍臣咸稱土德當王之兆也二六唐南康廬山尼悟性傳悟性洛陽人於衡州遇法照闍黎得念佛法門大曆六年居江西廬山篤志念佛求生西方忽聞空中樂聲謂左右曰吾已得中品生矣見諸同志念佛精進者皆有蓮花以待其生言畢而逝時年二十四二七唐衡嶽某庵尼無染傳無染韋氏女家世顯貴大曆中出家事衡嶽大明律師傳其戒法奉行惟謹大明示寂後無染涕泣求永州司馬柳宗元為作碑銘為言其師道德為尤備宗元因書諸碑陰二八唐長安真化寺尼如願傳如願隴西李氏女申公之裔天生道芽自然神秀十一詔度二十圓具彌沙塞部其所務也分氎之義不殊析金之理斯在僅登十臘聲實兩茂邀臨香壇辭不見允望之儼然即之溫然其慧也月照千潭其操也松寒萬嶺乃曰威儀三千吾鏡之矣度門八萬復焉在哉遂習以羅浮雙峰無生之觀位居元匠矣代宗命貴妃獨孤氏葛覃蘊德十亂匡時受道紫宸登壇黃屋因賜師紫袈裟一副前後所賜綿綺繒帛凡數千匹以旌其高燦乎盈庭了無是相道何深也由此敕書疊篋中使相望御馬每下於雲霄天花屢點於玉砌締搆多寶佛塔繕寫妙法蓮華環廊繚垣金剝熠耀額題御札光赫宇宙大曆十年歲次乙卯五月草九日薨於長安真化寺春秋七十六具以上聞皇情憫焉中使臨弔賻贈之禮有加常等弟子長樂公主與當院嗣法門人登壇十大德尼常真敕弟子證道政定證果寺大德凝照惠照凝寂悟真資敬寺上座洪偃寺主孝因律師真一遠塵法雲寺律師遍照等凡數千人則懿戚相門愛道花色而為上首忽喪宗匠如覩鶴林即以其年七月十八日奉敕法葬於長安城南畢原塔之禮也素幡悽於道路丹旐慘於郊扃千福寺飛錫法師為撰大唐真化寺多寶塔院故寺主臨壇大德尼如願律師墓志銘略曰紫袈裟者彼何人已了如來清淨身登壇不向明光殿去去應超生死津二九唐婺州金華山尼實際傳實際氏族不詳通曉禪理隨方化導成就法事婺州金華山俱胝和尚初住庵時實際忽自遠方來戴笠子執錫繞俱胝三匝曰道得即下笠子如是三問俱胝皆無對乃曰日勢稍晚何不且住實際曰道得即住俱胝又無對實際去後俱胝嘆曰我雖處丈夫形而無丈夫氣不如棄庵往諸方參尋善知識去其夜山神告曰不須離此將有肉身菩薩來為和尚説法逾旬果天龍和尚到庵俱胝即迎禮具陳前事龍竪一指示之俱胝當下大悟自此凡有學者參問俱胝唯舉一指無別提唱三唐臺建安寺尼法空傳法空俗姓韓氏宣州人也幼時辭親依五臺山西南一百餘里建安寺出家後於祇洹寺受戒每誦法華用為常務後負笈聽學經律數十載間殊無開悟自知性乏明慧無宿習力嘗聞五臺山文殊菩薩現種種身賑濟群品人傳有僧道超別無行業但久住華嚴寺不出山門二十餘載其後命終生於兜率彌勒內院彼天人謂超曰爾於人間別無妙行祇承文殊菩薩境界力故得生此處爾可還下人間接誘四部俾令聞知文殊功德冀望暫登此山中大銷諸罪則用補天之闕行也道超依言不捨天報下告人間法空如是思惟文殊菩薩大願境界不可思議生希有心復自念言無始生死三界流轉不得解脫善惡二業由心造作遂發大願往五臺山志求大聖垂慈引接乃與親妹尼立願偕行以元和四年屆山巡禮遍遊五頂覩種種化現後至華嚴寺西北三泉院前深林中逢一老人謂法空曰汝宜住此修行決證勝果言訖遂隱法空知大聖告諭乃悲泣雨淚久之方自悔責惡業罪障志願滅除即依此地別建草庵以居策勵三業曉夕靡怠至元和八年二月十五日取身所著衣令弟子悉送常住施大衆用乃集衆取別人問其故法空告曰我從止此來蒙大聖告語教示妙法蓮華四字開佛知見清淨無染得生淨土衆各努力無得空過言訖而逝端坐如生衆遂荼毗收得舍利千餘粒四衆分之以充供養三一唐洪州天宮寺尼妙寂傳妙寂姓景氏初嫁任華父鼎與華往長沙廣陵間元和十一年之潭州不復過期數月妙寂忽夢父被髮裸形浴血滿身泣曰吾與汝夫湖中遇盜皆已死矣以汝似有志者天許復讐但幽冥之意不欲顯言故吾隱語報汝誠能思而復之吾亦何恨妙寂曰隱語云何鼎曰殺我者車中猴門東草俄而見夫形狀若父泣曰殺我者禾中走一日夫妙寂撫膺而哭遂為女弟所覺泣告其母闔門大駭念其隱語杳不可知訪於鄰叟及鄉閭之有知者皆不能解秋詣上元縣舟楫之所交者四方士大夫多憩焉而又邑有瓦官寺寺上有閣倚山瞰江萬里在目亦江湖之極境遊人莫不登眺吾將緇服其間伺可問者必有醒吾惑也於是緇衣往上元捨身瓦官寺日箕帚灑掃閣下間則徙倚欄檻以俟識者見高冠博帶吟嘯而來者必拜而問居數年無能明者十七年歲在辛巳李公佐者罷嶺南從事而來攬衣至閣神采俊逸頗異常倫妙寂前拜泣且以前事問之公佐曰吾生平好為人解迷況子之冤懇切而諄告如此當為子思之默行數步喜招妙寂曰吾得之矣殺汝父者申蘭殺汝夫者申春耳妙寂拜喜嗚咽叩問其説公佐曰夫猴申生也車去兩頭而言猴故申字耳草而門門而東非蘭字耶禾中走者穿田過也此亦申字也一日又加夫蓋春字耳妙寂喜若不自勝久而掩泣拜謝曰賊名既彰雪冤有路苟獲釋憾誓報深恩婦人無他唯潔誠奉佛祈增福海耳乃再拜而去元和初泗州普光王寺有梵氏戒壇人之為僧者必由之四方輻輳僧尼繁會觀者如市焉公佐自楚之秦維舟而往觀之有一尼眉目朗秀若舊識者每過必疑視公佐若有意而未言者久之公佐將去其尼遂呼曰侍御元和中不為南從事乎公佐曰然然則記小師乎公佐曰不記也妙寂曰昔瓦官寺閣求解車中猴者也公佐悟曰竟獲賊否妙寂曰自悟夢言乃男服易名士寂泛傭於江湖之間數年聞蘄黃之間有申村因往焉流轉周星乃聞其村西北隅有申蘭者默往求傭輒貶其價蘭喜召之俄又聞其從父弟有名春者於是勤供執事晝夜不離見其可為者不顧輕重而為之未嘗待命蘭家器之晝與群傭共作夜寢其席無知其非丈夫者逾年益自勤幹蘭愈欣念視士寂即自視其子不若也蘭或農或商或畜貨於武昌開鎖啓閉悉委焉因檢其匱中半是己物亦見其父及夫常所服垂涕而記之而蘭春奴出處未嘗偕在慮其擒一而驚逸其一也銜之數年時值重陽二盜飲既醉士寂奔告於州乘醉而獲一問而辭伏就法得其所喪以歸盡奉母而請從釋師洪州之天宮寺尼洞微即昔時受教者也妙寂遂一女也誓血誠獲讐天亦不奪遂以夢寐之言獲悟於君子與其讐者得不同天撫此微軀豈酬明哲惟捨身梵宇無他虔誠法像以報效耳公佐大異之遂為作傳三二唐長安龍花寺尼契義傳契義姓韋氏京兆杜陵人也曾王父諱安石尚書左僕射中書令大父諱斌中書舍人臨汝郡太守烈考諱袞司門郎中眉州刺史家承卿相德勳之盛族為關內士林之冠始先妣范陽盧夫人以賢德宜家蕃其子姓故同氣八人而行居其次在女列則長焉自始孩蘊靜端介潔之性及成人鄙鉛華靡麗之飾密置心於清淨教親戚制奪其持愈堅年十九得請而剃落焉大曆六年制隸龍花寺受具戒於照空和尚居然法身本於天性嚴護律度釋氏高之國家崇其善教樂於度人敕東西街置大德十員登內外壇場俾後學依歸傳諸佛心要既膺是選其道益光門人宗師信士嚮仰如水走下匪我求蒙持一心之修繕佛宇來四輩之施捨金幣高閣山聳長廊鳥跂象設既固律儀甚嚴率徒宣經與衆均福故聞者敬而觀者信如來之教知所慕焉嘗從容鄉里指於北原而告其諸弟曰此吾之所息也為其識之蓋示生歸於佛歿歸於鄉所以報生育劬勞之恩於萬一也元和戊戌歲四月庚辰恬然化滅報年六十六僧夏四十五粵以七月乙酉遷神於萬年縣洪固鄉之畢原遺命不墳不塔積土為壇植尊勝幢於其前窀穸之制咸所遵承弟子比丘尼如一等服勤有年號奉遺教杖而會葬者數百千人極釋氏之哀榮難乎如此從父弟鄉貢進士同翊撰唐故龍花寺內外臨壇大德韋和尚墓志銘三三唐丹陽三昧王寺尼法潤傳法潤丹陽陳氏女自少入道住三昧王寺屏除事緣精修禪慧通誦妙法蓮華經日夕不替好行利濟悲愍為懷貧苦無告多受其惠自則納衣百結享用極儉至七十四而化遺言令露尸施生命弟子遵承蟲獸噉盡唯心舌俱存舌猶赤色心稍黑焉即起塔緘奉三四唐瑞州末山尼了然傳了然姓氏里居不傳參高安大愚禪師悟徹玄旨機辨不窮住瑞州末山開堂接衆宗師法匠皆時造其門一日有灌溪和尚到來問曰若道得相當即住不然即推倒禪牀便入堂內然遣侍者問上座為遊山來為佛法來溪曰為佛法來然乃升座溪上參然問上座今日離何處曰路口然曰何不蓋卻溪無對始禮拜問如何是末山然曰不露頂曰如何是末山主然曰非男女相溪乃喝曰何不變去然曰不是神不是鬼變箇甚麼溪於是服膺作園頭三載僧至參然曰太縷生曰雖然如此且是師子兒然曰既是師子兒為甚麼被文殊騎僧無對問如何是古佛心然曰世界傾壞曰世界為甚麼傾壞然曰寧無我身三五唐西蜀慈光寺尼海印傳海印唐末人住西蜀慈光寺才思清峻落筆成韻全唐詩所採僧詩甚多而尼衆只印一人亦僅舟夜一章彌可貴矣其句云水色連天色風聲益浪聲旅人歸思苦漁叟夢魂驚舉棹雲先到移舟月逐行旋吟詩句罷猶見遠山橫餘作想亦稱此惜皆不傳
