body:
  text: 民國京口夾山沙門震華編述三六五代永明石佛寺尼昌志傳昌志永明石梘村人姓周氏五代間河南馬氏稱制娶為妃及馬氏歿辭歸削髮入山修道因石為佛因石為堂苦行清修至老不倦村人信服踰百歲乃涅槃人因稱其山曰師姑巖庵曰石佛寺至明嘉靖年間耕種者就此山挖得銅鐃法器并金銀叉釧相傳為周尼師遺物三七宋太原某庵尼智藏傳智藏太原人特事地藏菩薩欣求西方淨土捨錢二百文畫阿彌陀像左右脅士地藏觀音二體安置房舍信心禮供太平興國五年庚辰大風拔木破屋藏之所住亦罹於災明日尋像所在一併失之心生憂惱祈念地藏菩薩已而仰視虛空遙見一物飄忽不定數數放光如電一時許盤折下地拾而視之即所求像也藏不勝歡喜如舊安置屋內供事愈虔至七年二月二十三日語朋友曰地藏菩薩導吾於淨土明日決定可終燒香散花唱三尊名號各一百八遍端坐合掌向西方而卒三八宋東都崇真資聖院尼清裕傳清裕太宗第七女申國大長公主平生不茹葷端拱初上幸延聖寺抱對佛願捨為尼及真宗即位遂乞落髮上曰朕之諸妹皆厚賜湯邑築室外館以尚天姻酬先帝之愛也汝獨願出家可乎清裕曰此先帝之願也堅乞之遂允進封吳國賜名清裕號報慈正覺大師詔於都城西建崇真資聖院以居之敕釋門威儀教坊樂部以為迎導時藩國近戚掖延嬪御願出家者若密恭懿王女萬年縣主唐恭惠王女惠安縣主凡三十餘人皆隨出家詔於是日普度天下童子十人度一人既遂其志清修勵進書佛經要語遍貼座右以資警勉見人謙虛有禮未嘗以親貴自居每發誠懇語勸衆修道俗壽三十八尼夏十六而入滅三九宋西湖某庵尼勤超傳勤超初名琴操會稽任氏女甚慧敏早失怙恃流而為妓蘇東坡遊西湖與超相值知其宿根深厚因以佛法導之坡云何謂湖中景超云落霞與孤鶩齊飛秋水共長天一色何謂景中人超云裙拖六幅湘江水髻挽巫山一段雲何謂人中景超云金勒馬嘶芳草地玉樓人醉杏花天坡云究竟如何對曰門前冷落車馬稀老大嫁作商人婦因有所悟即日削髮為尼潛身自修以根器猛利不久即大契玄旨然密自韜晦不肯據室說法每謂人曰世事如網衆生盡墮彀中安得以慧劍割之吾以不昧前因而能反省今後自行惟恐不及尚敢言利人耶如有不諒而以小乘相責只得緘默受譏我行我素豈可漫跨闊步以取顛躓乎後不知所終四宋平江西竺寺尼法海傳法海寶文呂嘉之姑也根性極利樂修禪定首參法雲法秀和尚後至襄州石門領旨於法真言下既得法已隱平江西竺寺抱道自晦涵養聖胎諸名儒屢挽應世堅不從故其一生言行未能盛顯臨終說偈曰霜天雲霧結山月冷涵輝夜接故鄉信曉行人不知屆明坐脫四一宋建寧福國庵尼覺庵傳覺庵建寧游蔡院侄女志不出適願削髮為尼留心祖道時禪風大盛宗匠傑出有圓悟禪師者屢遷大剎湖海浩歸因往參之於示衆語下忽爾契入詣方丈白所得悟曰更須揚卻所見始得自由庵答偈曰露柱抽橫骨虛空弄爪牙直饒玄會得猶是眼中沙後回建寧住福國庵善於化誘衆所歸信四二宋東都妙慧寺尼慧光傳慧光字淨智生成都范氏其著書號唐鑑乃其叔父也參淨因法成禪師默契其機開法東都妙慧寺政和三年帝自禁中以法衣施諸禪長老光亦預焉因命資次說法而光受當其末升座問答罷顧視大衆曰若論說禪說道則諸大禪師已說了也教山僧到這裏說箇甚麼即得豈不見先德道千種言萬般解只要教君長不昧雖然如是畢竟如何遂以法衣覆頂良久云衲帔蒙頭萬事休此時山僧都不會便下座於時緇素聽者萬計靡不嘆服所以韓舍人子蒼銘光之塔稱其多聞善辨焉塔創於豫章西山聖相之原四三宋蘇州西竺寺尼智通傳智通號空室道人龍圖范珣女也幼聰慧長歸丞相蘇頌之孫悌未幾厭世相還家求祝髮父難之遂閉戶清修因看法界觀頓有省連作二偈見意一曰浩浩塵中體一如縱橫交互印毗盧全波是水波非水全水成波水自殊次曰物我元無異森羅鏡像同明明超主伴了了徹真空一體含多法交參帝網中重重無盡處動靜悉圓通後父母俱亡兄涓領分寧尉通偕行聞死心禪師道望特往謁之心見知其所得便問常啼菩薩賣卻心肝教誰學般若通曰你若無心我也休又問一雨所滋根苗有異無陰陽地上生箇甚麼通曰一花五葉復問十二時中向甚麼處安身立命通曰和尚惜取眉毛好心打曰這婦女亂作次第通禮拜心然之於是道聲籍甚政和間居金陵設浴於保寧揭榜於門曰一物也無洗箇甚麼纖塵若有起自何來道取一句子玄乃得大家入浴古靈祇解揩背開士何曾明心欲證離垢地時須是通身汗出盡道水能洗垢焉知水亦是塵直饒水垢頓除到此亦須洗卻後為尼名惟久挂錫姑蘇之西竺緇白日夕叩問得其道者頗衆俄示疾書偈趺坐而終有明心録行於世四四宋溫州淨居寺尼慧溫傳慧溫鄉里不詳辭親出俗誓明大法後參龍門清遠禪師有悟住溫州淨居寺舉揚向上一著參學者如水赴壑上堂舉法眼示衆曰三通鼓罷簇簇上來佛法人事一時周畢溫曰山僧道三通鼓罷簇簇上來拄杖不在苕帚柄聊與三十四五宋蘇州資壽寺尼慧照傳慧照字無際張侍郎淵道之女初居家日有相者過之曰此寶座說法人也後果為尼依資壽無著落髮無著示以宗門下事苦志力究雖有所入仍未徹底時杭之徑山為海內禪窟大慧杲老主之訪道之士不絶於途其師嘗親依座下破除疑情照亦時有所聞心焉嚮往特攜瓶鉢登山請求開示久之領悟玄機得受記莂歸後無著畀以法席命其代座接衆化導之盛不減乃師風範四六宋關西某庵尼真如傳真如關西王氏女早選入官以才能為內夫人隸喬貴妃閣喬氏崇佛容其剪髮參道四方入閩與大慧禪師小溪法會一日作偈曰平地偶然著顛起來都無可說若人更問如何笑指清風明月以之呈證慧欣然許可特為對衆小參說偈曰今日如師姑昔日王師父身居羅綺叢只著粗麻布開口便高談嫌佛不肯做跳出是非坑截斷生死路入虎穴魔宮心中無怕怖杜撰八陽經自有三千部愛吟落韻詩偏不勒字數行腳走天下參禪無所悟近日到雲門一時都敗露錯認碓嘴頭喚作冬瓜瓠如此作師姑勸君少喫醋更有一處乖且道那一處嘉州大象喫炙麩陝府鐵牛撐破肚如之施為可概見矣四七宋蘇州資壽寺尼妙總傳妙總字無著姓蘇氏父中大夫象先南徐丞相實大父也年甫十五忽念曰吾生身何來死復何去良久脫然有得初不以為意長適毗陵許氏不膠世故志慕空宗以禪寂為進修時惠嚴圓公嗣圓照佚居普門乃扣以出世間法機感相契次見關西智寂室光真歇了問答如流咸敬異之偶夫壽元官嘉禾大慧至郡元具飯以迎總出禮拜無一言大慧退謂給事馮公濟川曰許司理閣中曾見神見鬼但未遇本分鉗鎚如萬斛舟置之絶潢斷港莫能轉動馮曰何言之易耶慧曰他若回頭定須別也次日道俗請慧說法總與會慧痛詆諸方異見邪解聽者駭顧總獨喜見眉睫間既下座總請道號慧以無著號之且示以偈曰盡道山僧愛罵人未曾罵著一箇漢只有無著罵不動恰似秦時𨍏轢鑽既罵不動為甚麼似𨍏轢鑽具眼者辨越明年總登徑山隨衆坐夏濟川亦在焉慧上堂舉石頭恁麼不恁麼總不得語馮曰某會得也慧徵之馮著語曰恁麼也不得蘇盧薩婆訶不恁麼也不得悉哩薩婆訶恁麼不恁麼總不得蘇盧悉哩薩婆訶慧舉馮語似總總曰人謂郭象注莊子卻是莊子注郭象慧雖異其言但默而不顧且欲激其遠到忽一日正危坐間豁然大悟洞見大慧委曲相為處不覺撫掌厲聲曰這老賊這老賊遂呈頌云驀然觸著鼻頭伎倆冰消瓦解達摩何必西來二祖枉施三拜更問如何若何一隊草賊大敗慧亦以偈印之汝既悟活祖師意一刀兩段直下了臨機一一任天真世出世間無剩少我作此偈為證明四聖六凡盡驚擾休驚擾碧眼胡僧猶未曉時萬庵顏公首衆與一千七百衲子咸以偈餞其歸且賀法門之得人也馮公猶未之信舟歸無錫問總巖頭為渡子時婆生七子話徑山稱道人會得作如何會總云已上所供並是論實仍以偈明之有以禮部僧牒無著師號為施者師說偈受之祝髮披緇克遂初志紹興壬午年也時張公安國守吳門資壽虛席張盡禮迎請乃開堂於資壽拈香為大慧之嗣唱提具於語録乾道六年七月十四日集衆說偈畢撼之則已去矣年七十六全身葬於無錫軍將山東紹定庚寅閏二月末遷葬於平江虎丘之東北庵曰達本奉塔藏之四八宋溫州淨居寺尼妙道傳妙道延平尚書黃公裳之女參徑山大慧禪師得法住溫州淨居寺開堂日乃曰問話且止直饒有傾湫之辨倒嶽之機衲僧門下一點用不著且佛未出世時一事全無我祖西來便有許多建立列剎相望星分派別以至今日纍及兒孫遂使山僧於人天大衆前無風起浪向第二義門通箇消息語默該不盡底彌亘大方言詮說不及處遍周沙界通身是眼覿面當機電卷星馳如何湊泊有時一喝生殺全威有時一喝佛祖莫辨有時一喝八面受敵有時一喝自救不了且道那一喝是生殺全威那一喝是佛祖莫辨那一喝是八面受敵那一喝是自救不了若向這裏薦得堪報不報之恩脫或未然山僧無夢說夢去也拈起拂子曰還見麼若見被見刺所障擊禪牀曰還聞麼若聞被聲塵所惑直饒離見絶聞正是二乘小果跳出一步蓋色騎聲全放全收主賓互換所以道欲識佛性義當觀時節因緣敢問諸人即今是甚麼時節蕩蕩仁風扶聖化熙熙和氣助升平擲拂子下座尼問如何是佛道曰非佛曰如何是佛法大意道曰骨底骨董問言無展事語不投機時如何道曰未屙已前墮坑落塹四九宋遂寧香山尼佛通傳佛通遂寧高氏女童真入佛志希賢聖因誦妙法蓮華經有所省發未能自肯聞石門元易禪師之道特往參謁乃曰成都喫不得也門拈拄杖打出通忽悟曰榮者自榮謝者自謝秋露春風好不著便門拂袖歸方丈通亦不顧而出由此道俗景從住遂寧香山大宏宗旨得法者甚衆五宋平江妙湛寺尼文照傳文照號慈鑑溫陵人姓董氏十七得度遍迹祖闈獲證於甘露仲宣長老蘇州郡守陳公師錫聞其道德命居妙湛開濟度門後五遷道場皆革律為禪吳中尼剎禪林實始於照也太宰鄭公居仁奏賜法號并紫方袍極一時之榮其上堂法語妙義雋永燈史所傳者只一則而已今為録之靈源不動歷歷孤明是誰光彩若道真如實際大似好肉剜瘡更作祖意商量正是迷頭認影老胡四十九年說夢即且止僧堂裏憍陳如上座為儞諸人舉覺底還記得麼良久曰惜取眉毛好五一宋永嘉妙果寺尼文贊傳文贊紹興間人先是潛澗寶印法師傳天台教於永嘉妙果未幾文贊來施寶藏值萬金緇素咸悅文贊富於財積而能散生平植福之施動以千緡計又罄衣鉢以製是藏百寶莊嚴極其工巧寶印走書越中乞王十朋為作記五二宋溫州淨居寺尼法燈傳法燈字無相自幼出家參究禪旨有尼慧溫禪師住溫州淨居寺為當時大善知識燈往侍座下隨衆請益一日忽然大悟以呈慧溫溫為印證後繼其法席上堂拈拄杖曰觀音出普賢入文殊水上穿靴立擡頭鷂子過新羅石火電光追不及咄五三宋海鹽法雲寺尼正覺傳正覺海鹽人樞密郭三益孫女適雲間葉氏早寡誓節為尼居法雲寺蒲團靜坐參究本來面目焚香掃地清閒自適間為詩歌而寓化導有絶句云春朝湖上風兼雨世事如花落又開退省閉門真樂處閒雲終日去還來幽鳥枝頭不住聲天開雨霽一窗晴西來妙意非文字金屑休教落眼睛五四宋蘇州李氏庵尼祖勤傳祖勤華亭計氏女少依潤州焦山或庵禪師咨決大事旦暮精勤久而有省說法無礙文思敏速隨意寫作皆詮妙旨有俗官伸紙討偈勤書之曰終日為官不識官終年多被吏人瞞喝散吏人官自顯揭翻北斗面南看言近旨遠大率類此多處請出世堅臥不起終於姑蘇楓橋李氏庵詩文數卷稿佚不傳五五宋常州淨慧寺尼德英傳德英字真淨楊億五世孫女性聰慧依達庵有悟入徑山佛照見其機辨如流許為再來毒種後說法於蘇州之朱明委蛻於常州之淨慧其自讚云自讚讚不出自畫畫不成有箇本來相如何呈似人活潑潑本無生鼻孔依然搭上唇叢林傳之癡鈍跋其録行世五六宋南昌妙住庵尼黃心傳黃心南昌馬氏女乳名瑙兒丱歲從父問字明敏絶倫兼閒女紅愛弄管絃每潛鄰閨習之畏家庭譴責也年十三慈父見背依母針黹度日尋嫁茶商季某為妻季因事得罪遂為南昌知府某所得越一年知府亦陷於法心遂輾轉為妓一日有一老尼容止甚醜陋故犯心輿婢從訶之不去心遂搴帷審視若故相識者尼見心驀然喝曰爾不憶如來座下失聲一笑時耶心聞言頓悟前生方欲酬答尼已不見心既歸遂屏謝遊冶即日覓得妙住庵依師出家蓋嘉定十二年四月八日也時瓊琯紫清真人白玉蟾方訪道入浙留滯南昌聞知其事大為嘆美贈以詩曰如今無用繡香囊已入空王選佛場生鐵脊梁三事衲冷灰心緒一爐香庭前竹長真如翠檻外花開般若香萬事到頭都是夢天傾三峽洗高唐又贈以詞曰豆蔻丁香待則甚如今休也爭知道本來面目風光灑灑底事到頭驚鳳侶不如嚲脫鴛鴦社好說與幾個正迷人休嗟訝紗窗外梅花下酒醒也教人怕把翠雲翦卻緇衣披挂柳色已參彌勒了趙州要勘臺山話想而今心似白芙蕖無人畫其師為一有道高尼年已八十餘度弟子十餘輩嘗曰余最後弟子尚未來及心發道意使者方至門尼即遙呼曰汝之來意我已預知令彼速來使者驚駭返報心乃剃度受戒未久其師付以衣鉢溘然圓寂心為庵主之後終日潛修道望蔚著四方叩法席者逾三百衆齊寮靜室鱗次櫛比更興大願鑄銅鐘一口重四萬八千斤因冶經八易潰不成形心自計願力不虔乃有此失遂於九次捨身入爐鐘竟圓滿五七宋錢塘某庵尼能奉傳能奉錢塘人嘗從大德聽講彌陀經聞知西方種種勝妙但能深信發願持名不輟即可往生於是專修淨業不習餘乘行之數十年工夫綿密時獲感應常見佛光照身清涼自在一日無疾告其徒曰吾往生時至少頃衆聞誦佛聲厲往視之已合掌面西坐逝矣異香滿室有樂聲隱隱西去五八宋明州楊氏庵尼慧安傳慧安明州人住小溪楊氏庵初誦金剛經寒暑不輟後棲心淨土室中供彌陀觀音勢至三聖香花幡蓋莊嚴隆重禮拜供養意極誠懇誓畢此形骸脫離娑婆往生極樂持戒等護浮囊小心翼翼口不妄言行不亂步內外調柔如入三昧常於室中見佛光下燭一日示疾端坐戒衆勿喧移時曰佛至矣令衆唱佛名倏然脫去年九十六五九宋衢州淨信庵尼劉鐵磨傳劉鐵磨衢州人出家邑之淨信庵其師學禪有得時為道諸祖機緣鐵磨生具宿根如說而參頗有會心已而廣涉叢席親諸知識一日參子湖禪師湖曰汝莫是劉鐵磨否乎磨曰不敢湖曰左轉右轉磨曰和尚莫顛倒湖便打侍座數年悟徹玄關受法回庵廣興化益因其開發而見諦者不可勝數後倒立而化六宋德州楊樹庵尼白佛傳白佛德州人姓梅陳氏甥女姐妹三人佛第三幼慕宗旨共誓不嫁出家參方歷諸名剎勇猛精進各有悟入回里仍同居止終日互話無生一室融融弟子尊為三聖四事供養不使缺乏紹興五年俱坐化大楊樹下鄉人伐木置水中逆流而上因刻木祝之香火不絶六一宋松江寂照院尼如湛傳如湛號渾源湖州王氏女母曹氏持奉圓通大士湛在襁褓間即能道圓通品中語隨父防禦佐金陵戎幕遂落髮於清涼寺尼僧智圓所能通華嚴圓覺法華諸大部經鋭志參訪耆宿慶元間至華亭禮船子塔時安康郡夫人號普明居士者與無住居士二人留心大乘得湛談論洞明心印郡中適寂照院虛席請湛開堂一日與二居士泛舟城南至蓮花蕩見水天交接湛招之曰此地塵跡不到可建立梵剎即鳩工庀材果得神龍窟遂定基興建檀施雲集不數月而寺告成六二宋仙居淨勝院尼了證傳了證仙居夏氏女幼遇相士謂其父曰公女丰骨幽異殆苾芻草也若結朱陳旦夕不祿矣因命之皈教於淨勝院學習大乘了悟心宗為人解說經旨妙義泉湧滔滔不絶其教人學佛不可好高務遠必須腳踏實地驀直行去日久自見功效比親死哀毀骨立築庵冢旁居守以終其身弟子依戀不捨躡跡追隨庵小不能容衆有餐風飲露而侍從者檀信熏其法化共捨淨資增廣屋宇由是唄聲梵韻晝夜不斷後自知時至趺坐而化六三宋仙居如來庵尼道輝傳道輝仙居范氏女嘗食魚鮓心動遂茹素持律出家後精通佛法搆一小庵名曰如來自繡大士像懸之中楹昕夕禮拜歲旱出為民求雨立驗道譽洋溢遠達紫宸每受召入宮為后妃說法受戒賜之錢帛即給貧者賜號普濟大師其居庵中夏則施茶冬則施粥門外築一方亭中設坐具方便行人諸有利濟皆自為之年六十七無疾而化六四宋蘇州延聖院尼法珍傳法珍字弘道潞州崔進女也幼習佛乘明了大義性喜流通正法書寫刊布終年不倦大定十八年印經一藏進於朝命聖安寺設壇為受比丘尼戒二十三年賜紫衣宏教大師明昌四年立碑石祕書丞兼翰林修撰趙渢記翰林侍講黨懷英篆額法珍嘗於蘇州陳湖磧砂延聖院斷臂募刻大藏三十年始就緒當時檀越有破産鬻兒應之者法珍化後其徒復斷臂續之更三世其願始滿六五宋西湖五雲山尼楊淑芳傳楊淑芳西湖樵家女理宗選妃日賈似道匿為己妾即德裕太學生百字令中所指新塘楊柳也有無名氏題壁云山上樓台湖上船平章醉後懶朝天羽書莫報樊城急新得蛾眉正少年淑芳亦知必敗營別業以遁跡焉木綿之後自度為尼罕有知者詞數闋今録其浣溪紗云散步山前春草香朱欄緑水繞吟廊花枝驚墮繡衣裳或定或搖江上柳為鸞為鳳月中篁為誰掩抑鎖雲窗更漏子云墨痕香紅蠟淚點點愁人離思桐葉落蓼花殘鴈聲天外寒五雲嶺九溪塢待到秋來更苦風淅淅水淙淙不教蓬徑通今五雲山下九溪塢內尚有尼庵
