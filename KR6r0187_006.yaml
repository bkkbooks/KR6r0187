body:
  text: 民國京口夾山沙門震華編述一七四民國揚州福興庵尼信道傳信道字真培金山青權禪師之母也俗姓張氏江都人歸同邑丁溝闞公宏能為簉室生三子青年喪夫矢志守節專精念佛雅尚清修怵火宅之焚如耽清涼之解渴始於宣統二年金山秉受五戒旋於本州福興庵依心誠禪師披剃出家民國甲寅於本州福緣寺受具足戒淨行高潔律儀維嫻朝鐘夕梵指清泰以為期坐誦行思悟心土之不二屢感彌陀金容炳煥立於屋脊三聖儼然又於清夜見圓光如月從空而下直投於懷道心身歡悅如灌醍醐眠食輕安永斷煩惱自壯至老數十餘年如群流之赴海隨曲折以無回若衆木之含春吐芬芳而競秀不由策進自然無怠無荒用之彌勤豈曰以冬以夏民國七年六月二十八日於福興庵無疾而終享年八十有三青權禪師躬視裝殮遵制荼毗火焰騰空祥光四溢凡軀脫落德性周圓火滅收取靈骨得舍利三枚光潤活潑恣態如生九華松月上人為作碑銘曰巍巍禪師含辛茹苦志篤樂邦精誠孔聚感佛金容光森梁柱滿月墮懷瑞相斯睹厲行綺歲慶快暮年悟徹心土去若安禪體輕如蛻火迸祥煙舍利不壞至固極堅信為道源惟功德母三草二木以生以茂法雨既沾隨根普受七覺花開八支果阜無土不育難長菩提有信斯就如取如攜諸佛薩海心想能齊是心是佛心作有稽敢告後來以師為法精誠既遒罔怠以怯功不唐捐薰修淨業能見實相超塵點劫一七五民國宛平某庵尼如智傳如智號禮泉姓王京兆宛平人秉性貞靜幼不茹葷喜聞經聲佛號見從姊出家住山苦節修行則思齊念生父母篤愛故不敢言但常隨姊山居負薪汲水蔬食菜根自若也十八歲染疾垂危醫藥罔效氣息奄奄昏迷中唯呼剃髮求戒別無所言父母痛女心切遂遙向佛前允許病乃漸痊二十一歲與姊同師保定老和尚祝髮是年冬求戒禮懺習律惟謹惟勤體不勝勞宿疾復發病中勉受十支淨戒戒師憐之命回寺調養以便愈後受具及回寺病革已不可治然念佛不輟一日忽開眼望空合掌高聲稱觀世音菩薩三聲作三禮拜狀溘然而逝殮訖越五日戒師送衣鉢至父母將所與衣搭在身上啓棺視之則翻身吉祥而臥面色如生頂尚溫暖咸知為生西明證時民國八年十一月十七日也一七六民國興化金善庵尼杲峰傳附智明傳杲峰字雲慧鹽城房氏女父啓明營米為業性純靜好善聞先輩傳說污穢字紙第一折福因此凡見棄紙於地而有字者必拾而化之峰幼隨父至興化寄居西門三聖庵從師走讀通曉文理因身在庵宇常聽有道高德談論佛乘心大好之遂蓄意清修不願適人後為某高第聘去教讀子女終非其志辭往金善庵一心辦道間為諸沙彌尼講授典章文譽翕然居數載感於庵中屋宇疏漏乃捐資獨建中廳三間峰具法眼善於鑑別根器臧否人物皆得其當民國八年秋嘗以租事至唐港見震華方十一歲與語大加歎賞時華早失怙恃依兄嫂力田處境甚苦當承導以佛法亟攜至城擇邑中名剎曰圓通者送往出家由是得遇栽培層層上進乃至得浴大藏教海身心受潤飲水思源莫非最初獎拔汲引之所惠也民國十年三月三十日峰以疾委蛻遺命削髮受具戒世壽六十五歲華時剃度後二年附熟讀書聞之悲戀不已如失慈母恨未有以圖報庵主智明在旁勉曰汝不必哀慕若能立志做人將來造成法器是則峰公之所望也智明字真修為建庵第一代興化周氏女年及笄守貞不字依幻明上人出家受具足戒於安豐觀音閣邑之鸚鵡橋南有金氏隙地數畝施與建庵本印度只園之意名曰金善日事禮誦精進逾恆拜大方廣佛華嚴經全部一字一禮凡轉頭六周足跡深陷寸許見者驚歎經完之後恆持觀音名號每日亦必數百拜課餘不作多言惟勸人為善則必苦口叮嚀娓娓不倦終其身納衣草履淡淡明志民國十五年三月三十日示寂世壽七十七歲一七七民國台州某庵尼如覺傳如覺姓許台州人有兄三姊一其次三二兄俱出家覺與姊亦慕之遂於清光緒十一年正月十五日同時披剃時姊年二十二而覺乃二十具戒後姊妹二人同閉關三年又偕往各名山進香一年歸復同閉關九年出關後修持益篤每日必禮佛千拜誦佛號無算見人即勸以念佛謂多念一句佛即少說一句話少生一惡念徒衆經其感化訓誨均修持甚力民國壬戌六月三日早課畢忽覺胸腹漲悶徒衆急以痧藥進無效次日已小愈仍起課誦如常時飯罷驟發寒乃蒙被臥終不出汗六日已乏甚惟神志甚清召徒至榻前念佛至傍晚目漸瞑手足亦冰因徒衆號泣復張目微笑語衆曰生何喜死何悲汝曹何泣為哉我今去後汝曹相處宜愈和好修持愈勿懈生死事大時光有限萬勿自誤汝曹既已以女子身現尼僧相得尼僧名不可謂非殊勝因緣無量幸福務須時時惕勵保此比丘尼人格做一箇有名有實的尼僧語畢遂寂然長往狀極安祥頂門至次午猶熱世壽五十七戒臘三十八一七八民國台州某庵尼蓮貞傳蓮貞丹徒趙氏女幼與其表兄某同學因相愛且私訂婚焉表兄早喪父母家貧因育於趙氏貞之父母素重利以其貧頗不齒及知其女私以身相許怒而逐之某悲憤交併遂就剃髮匠將辮髮剃除包以紙附以書丐婢投之貞己即投金山寺剃度為僧貞得書并髮欣然曰彼不我負我安可負彼我本擬一死以謝彼今彼既為僧我亦知所處矣乃宵遁輾轉至台州某庵投圓信比丘尼座下堅請祝髮圓師憐而許之遂於光緒二十五年八月二十日為貞剃度時年十有七也貞既現尼相修持勤篤日必誦阿彌陀經四十遍佛號數萬聲雖病亦不間斷受戒後始返里省親父母喜強其蓄髮還俗貞誓死不從居一月仍還庵自是修持愈謹民國十一年七月二十九晚燒地藏香畢忽覺頭痛便就寢晨興其徒悅禪以粥進貞曰無須可為我備水沐浴浴罷復剃髮及取新淨衣與袈裟等來披著妥當時衆聞訊咸至貞合掌向圓師點首者三曰師我去矣復向衆點首告別言訖遂瞑目長逝時壬戌八月朔日下午三時也春秋四十僧臘二十四一七九民國蘇州青蓮庵尼了定傳附德惠傳了定皖之崔氏女幼隨父游宦吳中適黃氏以有涉嫌疑事大歸父方正而嚴將處死母私縱之定既離家茫無所歸途遇青蓮庵德惠比丘尼忽大感悟遂尾行之及抵庵涕泣以前事白德師堅請出家德師憐而留之初不為祝髮居庵數月功課已熟習屢請德師求披剃德師鑑其誠且以美貌年青若不剃度常居庵中殊多不便因剃度使成正式尼相為取法名了定以姿容白皙乃自曬使黑以期毀容而謹行止受戒後閉關三年在關中於壁上貼大紙二其一曰汝是什麼人答曰我是一箇尼僧其一曰做尼僧應該怎樣答曰做尼僧應息妄念佛每生妄念及念佛疲倦時便讀此二紙心既大定念佛愈有精神德師甚重之謂人誰無過過而能改斯為無過又謂人人能如此立志天下無一不好的僧尼蓋少年男女出家初時難免不生妄念但能自己設法制止加以警勵日久妄念自止妄念止破戒壞法之事自不會發生修學亦自然勤奮而定則曰若天下為師者人人能如師之善於訓誨感導則無論何人出家亦必能持戒修行故世之破戒毀法者半為師者之過定待遇諸徒恩德有加師徒之間如母女焉定晚年專修淨土於民國壬戌十月二十九日無疾示寂頗多瑞相世壽七十六戒臘五十六一八民國鎮江雨華庵尼素密傳附素浩證行素密字定佛香山陳氏女五妹素浩字演開七妹證行字慈修並稟信根相偕入道密幼有至性好習宗教有八方某師日以其說進條示運氣諸法使鍊之密固聰穎稍聞即解依解而行髣佛有所得更以之傳人人頗受其化光緒三十二年持其道至日本遍游各埠見佛教在彼國極盛若英美之崇奉耶穌無異因止鎌倉回春院讀誦經書參究禪旨時訪圓覺建長諸寺僧審知佛法精義至高無上悔前所習為世間唾餘盡行捨棄頓萌祝髮之念宣統元年回國首朝南海感得異境即於上清涼禮霧山長老為師請賜法名往金陵千華律院乞受具足大戒期滿下山欲擇靜室修持至鎮江得雨華圓通二庵招素浩證行分居之修般舟三昧一期精苦卓越感發人心提倡十聲念佛其法簡便易行人多奉其教民國二年二次光復鎮地騷動密遂再往日本宏通佛乘已聞證行死親回料理葬事九年移居香港鳳凰山建楞嚴壇十一年至南京請棲霞山戒師若舜和尚蒞港於十一月十三日假民園主持佛七道場士女環集每日激增最多達四五千人聞法生信紛求皈依乃至不捨法緣懇乞展期三日時港地久乏聞薰是舉實開風氣之先而若公適繼乃師宗仰上人遺志重建棲霞堂塔願輪雖運於內緣會未集於外至此得密為之護持在港建立鹿野苑宏施法雨廣攝群機十餘年間而棲霞山林藻繪如新法相莊嚴圓滿成就迹其檀施之來多源於此密實與有力焉十四年密養靜庾嶺六月初七日遂示寂壽五十二骨灰賚回棲霞安葬一八一民國彭澤淨土庵尼果仁傳果仁彭澤陶氏女適宗姓清光緒丙午年出家於邑之淨土庵禮聖宗為師民國元年落髮初習導引術庚申春劉契淨居士等設佛學會於庵內因得聞念佛求生淨土之簡妙法門頓發信心盡棄其前盲修瞎煉之外道法而孜孜念佛更習金剛經彌陀經大悲咒分為早晚功課甲子冬微患痰疾其徒常參於臘月八日夢見童子四人前執幢幡後四人扛轎一乘云來接當家師往西方乙丑四月二十日仁自夢一僧左手捧蓮華鉢右手下垂過膝謂之曰汝當於六月五日登蓮座明日以告常參旋取鑰匙等付之囑云我得生西親承佛誨至慰汝好好侍奉師公撐持法門謹守皈戒念經禮佛如我在世無異不可妄為臨終前七日更令徒向山下人家告別契淨居士因其未受大戒請城隍廟比丘悟道為說三壇戒法及製衣具六月初三夜常參復夢一僧身長丈餘披紅袈裟胸前斜挂帶一條上書南無西方接引阿彌陀佛首戴蓮華瓣帽帽頂現白蓮一朵一佛趺坐其上口稱請當家師同去後二日即仁預告西歸之期悟道契淨等均來助念午飯後仁謂衆曰天氣太熱請各回家洗浴我戌時去浴罷再來未晚也衆果散去屆時至見仁趺坐念佛數聲而寂翌日入龕貌如生遺命散骨灰於路結衆生緣一八二民國南通大悲庵尼大悟傳大悟字法林姓袁江蘇南通人幼許邵未嫁夫卒誓不再適投縣西大悲庵為尼立志念佛求生淨土常云佛法之大唯淨土為契機拜經坐香等乃助消業障俾易成就淨業耳出家後力任苦行汲舂炊爨取給一己晨夕淨課日愈虔謹初剃染時年二十二夫家執世見百計阻之悟志堅卒成所願庵荒敗募修嚴飾闢佛堂營蔬圃資衆清修見人有苦隨為說法常有感動晚年因色力漸退急朝普陀九華頗感瑞相民國十六年二月示微疾病中書偈云世間萬緣都放下唯有念佛是真心一念超出娑婆苦貪瞋癡愛都除盡寸絲不挂光明臺參透法身脫苦輪得滿極樂清淨願再入娑婆度衆生至十八日見佛垂光接引安然化去世壽七十三至二十八闍維得舍利五粒一八三民國彭澤淨土庵尼聖道傳聖道彭澤宗氏女適陶姓清光緒三十二年出家於本邑淨土庵民國九年劉契淨居士創辦佛學會於庵內道乃一意念佛求生淨土十五年八月間夢一人來庵向之合掌云將接往西方給書一函囑勿遺失十月間夢朝南海舟行數日水盡登山見嶺旁一媼兩手遍現眼目光爍爍如電道問此何處曰靈山道乃脫帽下拜媼讚云汝念佛虔誠我將帶汝生西今且歸手引之起瞿然覺則帽脫在枕畔矣翌日即告徒孫常參謂吾於明正十三日去囑以後事甚悉臘月除夕常參夢道上殿禮佛禮畢言我去矣而庵外人聲鼎沸稱來迎老和尚至丁卯正月十三早課畢謂常參曰今日有佛事宜早作炊自入房印往生紙錢午供後用膳將竟手忽寒縮云要走手中飯碗忽旋轉上騰如花形升至一人身之高道笑曰好看哉約一刻鐘碗始降於坐前熏籠梁上端正而住碗內之飯未出顆粒誠不可思議至未時果安詳而逝一八四民國東臺蓮華庵尼印根傳印根字慧濟東臺丁氏女幼讀書知禮父母深愛之及笄適高氏舉一子因遭回祿災及夫身未幾子亦亡印根自計曰天豈欲助吾道故示此以去情縛乎果如此吾又何尤遂屏棄俗緣歸投佛法入本邑蓮華庵清修時庵中殿宇殘破椽梠欲脫草徑荒階等無人境有妙善妙守二師及善女五六人寄庵修行各自炊食無有主持望去滿眼煙塵為狀極苦印根歎曰此庵雖苦而道甚富他庵雖富其道不如吾今為道而來其境良宜乃依妙善為弟子時年方二十一既入庵後粗衣糲食同衆甘苦俗氏所有資給飲食則與衆同餐錢財則密蓄一處為續置庵産修理殿宇之需撤分爨之制統歸一人供養運土木購磚瓦庵日漸次修復閲五年投京口焦山求受居家五戒親聞法要道念益堅以尊敬善知識救濟窮苦為事年三十六始剃髮至南京寶華山受具足大戒戒事圓滿回經鎮江超岸寺參圓覺禪師得付正法茲後於佛法益漸清明研究經論自能開解遠近僧俗每有執經問難者皆隨所能而為之解凡事關佛教無不竭力而為遂為東邑尼僧之領袖至年四十七自歎光陰易邁雖外結善緣而己躬下事還未理著即於本庵禁足閉關院務財物悉付師兄印慈代理自則謝絶一切專辦生死其志強於身常數日不食而功課決不稍懈乃至昏倒於地起時猶自刻責不已民國十八年己巳四月中旬忽示疾於三日前分付後事一一分明遺囑喪事宜從簡朴勿尚俗情於二十三日卯時念佛聲中安然而逝一八五民國南京慧月居尼宏源傳附能開學如傳宏源字性亮剃度於南京慧月居發心甚早平生喜念佛勤禮拜敬師處衆一一平和誠懇寡言語攝身嚴待人厚自奉薄上殿念佛領導大衆爭先恐後朝斯夕斯寒暑不輟數十年如一日民國十九年庚午秋患病延醫調理未能奏效臥床數月形容枯瘦身體浮腫飲食漸減問病者至但點頭不多語祇管加緊念佛不進飲食已多日仍念佛不休臨終前數日嘗親見阿彌陀佛數次更聞異香滿室并蓮華現於牀前氣息奄奄時舌根尚能微動隨魚磬聲念佛於冬月二十八日正念分明而逝能開江北鹽城山東會館內天后宮住持生平以清規律己慕師公學如一生修持淨業寂後荼毗得舍利三顆及碧色寶劍二枝由是熏修益勤看經有省民國二十年辛未秋夢文殊菩薩示以逝期遂集衆念佛坐化寂後頂上暖氣如煙尚有聲音一八六民國江寧天印庵尼圓音傳圓音石埭人楊仁山居士次女也生於佛化家庭有鹿門遺風稟性敏慧十四歲能誦短部經長齊奉佛翹心淨土稍長每欲剃染藉專歸向一時未果所願二十一適有維揚之行因緣發現徑投圓覺精舍乞磚橋法藏寺妙空長老俯賜法名而剃度焉旋受具足戒於京口焦山歸里嚴持戒範止住寶坊祖母眷念情深不忍遠離特於住宅另闢淨室供其禮誦音日常研究教典刺血書彌陀經普門品佛遺教經各一卷以資上報下濟又精繪佛菩薩聖像分散遠近供養光緒二十五年覓得金陵城內基地一方建立梵剎標額天印雖曰朝暮自修實欲與仁老所創之金陵刻經處相近以便較閲經籍分擔弘化之責也庵成之後每屆結夏安居敬禮華嚴法華諸經自課極嚴了無倦態宣統三年秋仁老卒音哀慟之餘誓畢刻經之願挺身負責冒難乘危曾作募刻全藏緣起二千餘言辭旨懇切感發人心經其手點刊之書有西方發願文注集諸經禮懺儀十不二門文心解大日經疏義釋維摩天台疏等民國十九年九月初二日無疾而終壽六十有五一八七民國安慶靜室庵尼德成傳德成姓方安慶富紳習之公之女九歲投本城靜室庵出家二十五歲受具戒生平和靄待人戒律嚴身尤以禮拜持誦為事早年專誦金剛經中年後則禮拜華嚴法華各大乘經晚年轉而念佛一生精進修持晝夜翹勤寒暑無間數十年如一日兼好隨喜作諸功德尤能提倡佛法捐款興學并建蓮社領女衆念佛復常請法師講經或延居士演說佛理故安慶一隅佛法由衰而興得成之力為多民國二十一年春掩關三七日專誠念佛淨境中見我悲常寂四字并聞佛呼其名告以往生時日出關即囑衆為之預辦後事至六月果圓寂荼毗獲舍利數粒長圓各異有一粒長約半寸五色璀璨觀者皆歎希有世壽六十五戒臘四十一一八八民國南匯淨心庵尼淨船傳附淨願華慧蓮道蓮勝華根華廣傳淨船南匯虞氏女與尹氏女淨願為異姓姊妹同志學佛深信佛法有益人生誓欲出家以專其業立願奇切一再拒婚意不可回父母不忍奪其志乃聽二女同時剃度於縣之泥城淨心庵時為光緒二十年後事也兩師體素弱多病出家以後乃日健康至年七十許猶步履如常南匯尼衆殊少婦女對三寶亦罕認識自船願二師相偕現比丘尼相一時欽道慕德聞風興起而發大心相從出家者日盛船等以慈悲方便度人為懷凡求度者苟心真願切無不樂成其志為之剃染而於皈依弟子中之有機緣出家者尤時時力加勸勉以故四十餘年來幾無歲無善女人相從落髮現尼相多時年且達二三十人尼既日衆淨心雖大亦漸不能容於是乃分居三聖三昧大悲福緣蓮華等庵各住尼十餘人乃至數十人不等蓋舉凡南匯及其比鄰之奉川兩縣各庵所有之比丘尼幾無一非船願二師之剃度弟子與徒孫會合已圓寂者計之當有五百人之多洵屬希有事也觀音庵者亦為淨心分支之一以其中之尼多同胞姊妹故亦稱姊妹庵庵在南匯城內之西門住持華慧比丘尼為淨船之徒孫華慧潘氏女姊妹四人慧居長極賢孝敬淑家中自祖父母以下咸奉佛甚虔其姨母蓮道比丘尼與蓮勝比丘尼未出家時即友善蓮勝為胡氏女知書能文幼許字嫁有日矣而勝信佛彌篤堅不願從力求為尼父母不許勝即自將髮髻翦落親知不能強乃設法解除婚約任其入庵削染蓮道見其事大為所感不久亦即走從淨船落髮為尼華慧年十五即依蓮道受三皈時學經咒每至庵輒欣羡為尼之樂依依不忍去一日庵中又有二善女人剃度華慧見而心慕不已曰若得如此則此生之願足矣歸即請於雙親親曰人各有志焉能相強汝願為尼亦無不可但須遲數載俟爾弟妹長成後方可披剃華慧由是持長齊侍親撫弟妹佐治家政之暇輒靜坐念佛至二十一始獲蒙親許如願落髮於淨心庵時民國三年十一月十六日也明年受具旋從蓮道住觀音庵年餘蓮道仍返淨心而以觀音庵付慧主之未幾慧之次妹亦從其姨母蓮道剃為尼法名華根及幼妹華廣華穩長成亦樂願為尼偕兩姊同修其父母見長次二女出家後清靜安適一切勝善對幼女請許披剃即亦欣然允可廣穩二師本雙生乃於民國十年觀音誕日同時由慧根兩姊親為剃髮現尼相而慧根廣穩四師在俗時之閨友華桂華緣華遇華明華通華輪華俊及表妹華高華妙諸師亦先後因華慧姊妹之感化熏陶相繼落髮為尼高妙二師亦同胞姊妹俗姓張為其剃度師蓮道尼之胞姪女剃髮時姊草三而妹十八經云佛種從緣起不其然乎華慧所度弟子亦已達十數人其中同胞姊妹出家者有從能從賢乃王氏女能先皈依於慧至年草九始發心出家其妹賢堅請從乃於民國十六年二月初八日相偕披剃又有從儒從光乃吳氏女先世業醫從儒先二年剃度其妹則於民國十八年四月初八日落髮時年二十二華慧有二姪女亦依之為尼又自幼出家者三則皆其母與華慧友善而捨女入庵為其徒者慧嘗曰吾人既以殊勝因緣萬千之幸得度出家應深憫未得度之苦海衆生盡心力以濟拔方是我佛慈悲方便之道若能感之以誠化之以德加之以教誨勸導則人非木石雖極不肖之女子一朝落髮為尼亦未嘗不能堅其心志使其潛移默化奮勉懺悔放下屠刀立地成佛慧性極慈和遇諸徒若親女庵中清規整肅六時行道一入其中頓滌煩慮師徒兄弟之間旨趣相投志同道合無親疏無恩怨無吝妬無僞謙無猜疑無嫉忌無爭競共學共作相敬相親互勉互助各見以誠怡怡然融融然勝於家庭骨肉離俗清修之樂誠非塵世濁惡所可比也一八九民國江都德勝庵尼心忠傳心忠江都人俗姓杜氏秉性淑慎年十六即持觀音齊常誦佛號年十九歸吳氏遇上下以禮閫以內翕如也生一子出家即祥瑞法師是祥瑞受其幃訓信解行持為人所難嘗步禮五臺兩行般舟三昧顏大使惠慶趙內部長戴文杜中委虙皆與結林下交奉梵網孝名為戒之條每逾時必旋里省覲心忠年三十五獲親善知識受三皈五戒昕夕持誦而出塵之念日益切越三年竟投長生寺性蓮和尚座下剃染當以該寺兵燹之餘屋宇半就傾圮乃發心募化城鄉奔走不以為疲日以七萬佛號為恆課且行且念觀感而信佛者頗不乏人民國三年募秦郵楊姓獨建關房六座行僧得以潛修於是長生寺道風播於遐邇又募大殿及念佛堂閲時三載相繼竣工自此莊嚴輪奐寺貌重新遠近咸以微忠之力必不及此民國八年朝五臺山南歸覓得破庵名德勝稍加修葺足以清修忠以溽暑募緣深受暑毒致頭部生瘡人皆以為患忠獨淡然處之民國二十年病益劇雖極痛苦猶聞彌陀佛聲觀音菩薩聲間錯而念念至純熟密密綿綿遽然醒來其痛忽止感應有如此者忠自奉甚薄嘗稱馬祖一日不作一日不食之遺風故瑣屑雜務必躬為之居庵之後除念佛恆課外又每日加誦金剛經若干卷及早晚課歷十數年如一日二十三年夏祥瑞宏法於川忠忽染疾人欲函招祥瑞歸侍湯藥忠弗許曰弘法事大侍疾事小竟止之秋八月十七日往城內護法家有所接洽歸來即感不適人欲延醫診治忠曰吾於昨日夢佛船載五人兼欲載余余報緣殆將盡矣可請人念佛助余往生越二日疾大漸諸人念佛以一其心晚遂吉祥而逝時年七十餘矣祥瑞聞電遄歸為之闍維盡禮太虛法師等皆為文述其事一九民國某縣圓覺庵尼印心傳附慧修福修印全印微緣修恆修傳印心劉仲華居士之胞姊年十七適費觀察之次子越三載生女慧修是歲冬夫病逝乃嗣幼姪為子守節撫孤其翁姑以心母女剋夫剋父為不祥皆深疾視妯娌小姑復從而欺凌之心含辛茹苦忍受無怨言及嗣子長成竟不肖媳尤悍心稍加訓斥即怒目反唇乃歎曰有子若是不如無子豫本無子而必以人子為子本自尋煩惱既心冷望絶癡夢頓覺遂毅然攜女慧修婢福修同投圓覺庵披剃出家求懺悔了生死逮其家屬知之則母女主婢三人已俱現尼相時心年三十五明春受具戒即發願閉關究閲法華楞嚴圓覺諸經圓滿後率慧福二師歷朝四大名山旋遊杭禮雲棲蓮池大師塔歸後始日誦淨土諸經晝夜念佛專志淨土宣統二年其師示寂遺命令心繼席初庵中落髮帶髮各聽自便十一人中帶髮者五自心主庵事即時時以剃落之殊勝意義與利益勸告蓄髮諸人於是印全師首發心剃落後月餘印微師繼之越三月緣修恆修二師又繼之最後印月師遂亦決心削染及全體均落髮心乃重整庵規以後凡願入庵修行者必須遵佛制如法剃度並規定早晚課誦外每日必齊集念佛三次每次兩炷香每年打佛七四次在七期中念佛日以十四炷香為度心性仁慈公正能遇人以恩化人以德故有所告誡庵衆無不服尤好行方便濟人急庵東數百步有寒士孫居士妻死無以殮將鬻其女女年二八甚端麗富商某擬以巨金聘為小星心聞之立以百五十金贈孫居士勸勿鬻女女有慧根感心恩自請於心願為徒其父亦懇心收録俾得無纍心遂欣然為女剃髮名曰樂修乃父視女落髮後即出家為僧心善化度接引弟子凡數十人自課日以彌陀經七卷往生咒二百十遍佛號萬聲為定則數十年中雖病時亦不稍減日中有事則於深夜補足之五十後年必禁足三次每次七日於此期中日食一餐不倒單不放參日夜禮拜作觀加行修持求生淨土而以功德回向衆生願一切俱得度脫民國二十四年正月初忽集衆尼而訓之曰爾等幸得人身聞佛法更幸而得度為尼作佛子實為難遇之緣希有之福無上之榮務須時時警策保持出家人本分嚴守戒規力求精進西方即在現前望各好自為之勤修勿懈師徒兄弟之間更須相見以誠自處以忍互勉以法毋得懷私立異分彼此生厚薄判親疏論多寡致啓爭競為世俗譏貽佛門羞至囑至囑言訖朗聲念佛衆尼和之至翌晨福修以粥進心微搖首仍默念佛號至晚十時半口不動而面仍含笑慧修以手試之息已止而體仍溫衆始信心功行之深為不可及世壽七十六臘四十一荼毗時焰發青蓮異香四散遠近見聞者罔不讚歎欽仰痛自策勵有章賀二女士且因心生西之奇瑞而感發大心亦來庵投慧修出家焉一九一民國無錫普渡庵尼定雲傳附智能定華傳定雲丹陽江氏女為定華尼之胞妹華初生時頂心腦後現有青記二大如錢許而雲則兩鬢各有一硃砂記故其親名華曰雙青名雲曰雙紅雲年六歲為匪以迷藥誘拐展轉鬻為江陰吳氏婢改名彩雲性穎敏頗得主人歡稍長念父母不置而家居何處及父之名胥不復省憶其主固信佛於淨室中供奉觀音雲因發願持長齊日禮大士默求垂佑得與二老相見早晚必侍夫人誦普門品大悲咒及菩薩名號寒暑十更志行不稍懈夫人屢欲遣嫁雲輒涕泣堅辭年草二其主人吳居士患病甚苦困頓牀褥逾半載吳夫人聞無錫鄉間普渡庵大士最靈因買舟率二女及雲前往求禱先問住持尼智能師以所需智能世家女幼以多病出家素具道行不重財物時適有一剃度弟子新示寂因笑曰小庵略有薄産出家人衣食粗足更何所需所缺者實惟徒耳夫人應曰外子病若起當捨一小女於寶庵為尼遂許願而去閲數旬大瘥夫人乃詢兩女孰願為父了願兩女默然夫人慍雲獨趨前請曰婢子無知願代小姐剃度為夫人完此宏願夫人且喜且憐慰之曰爾志誠可嘉但此乃大事關係一生宜三思而行勿視為兒戲雲曰剃髮披緇婢自願之誓不更變轉原擬再侍夫人三五年然後請今幸得此良機實婢之萬幸乞俯準毋慮夫人喜即認雲為義女函知智能師會施主某新介紹一零丁孤苦之信佛小女來廟出家法名定寶已擇定阿彌陀佛聖誕為落髮智能師得書因即請夫人速送雲來庵俾與定寶同時剃度免另擇日夫人乃於先兩日陪雲趕赴庵中先是雲之姊定華奉父母命十八歸莫氏伉儷甚篤壻有肺疾婚後病日劇卒不起彌留之際問華作何計華謂當相從地下其夫力阻謂爾雙親俱存烏可出此且以身殉節於我無益守則非一朝一夕之事為安全計不若削髮入空門學佛自懺諷經度我則節可完苦可拔結果可勝善勝於殉節多矣華即點首以應壻死目不瞑華乃翦髻置柩中並默禱於靈誓遵囑不相負禱訖目頓合終七後即投智能師座下剃度其受比丘尼戒猶不足兩年當吳夫人來庵許願日華適返里省親至是始與雲相見姊妹一別已十有六年形相既殊口音又變雲兩鬢之紅記以髮尚未剃掩而不顯華則雖已削髮因戴帽其青記亦蔽而不彰彼此初無從辨認惟互詫容貌之肖似及雲落髮時由華為之代刀將左鬢剃落後紅記頓現華固疑其為妹見記驚喜復剃右鬢之髮果亦有記如左乃確信此被剃者決為雙紅不禁喜出望外剃度禮成即拉雲至無人處而詰之曰師弟乳名非雙紅耶爾家有姊非名雙青耶曰然顧師兄何以知之華為喜極墮淚亟自脫其帽則頂心腦後各有青記宛然雲乃證知華即其胞姊雙青相與抱頭大哭既詢知兩親安健則又大為欣悅其師智能等知之咸稱異作賀午後雲即隨華往視父母其父遷錫經商已十餘年所居在城中離庵可十二三里雲一見父母即跪膝前痛哭母初不解及聞華言方知此新落髮之少年尼即其失蹤一十六載之愛女狂喜幾疑入夢蓋雲失蹤後母即茹素每日必誦大士名號數百聲祝女歸來至是果得骨肉重逢因愈信奉大士謂兩女曰爾姊妹若不出家為尼何能剃髮若不將髮剃淨互見青紅二記則手足相逢亦不能相識非菩薩靈感默佑萬難致此由是姊妹二人同心修學勵志行持每間旬餘必偕返省覲以慰親心如是者幾卅載其長次兄嫂皆能事親以孝且受雲等之化全家素食奉佛所生女先後均捨令出家從雲及華為尼雲感吳夫人恩歲趣一赴江陰探視夫人之長女家貧而多生育嫁後六年即以虛弱症死次女所偶非人家庭多故鬱鬱以卒臨終時深悔當初不出家為尼致得此悲慘不幸之惡果而欽羡定雲不置遺女一才能學語由吳夫人攜歸撫養其祖及父皆絶不問夫人謝世乃由雲納為徒教養成人年至十四方為披剃吳夫人遺囑以八百金給雲民國六年雲椿萱棄養兄嫂輩又以兩老遺資三之一贈雲姊妹雲及華悉以公之常住買田供衆絶不私蓄雲自雙親謝世足跡即不復入城市與華同發願閉關三載加行修持以報師德親恩圓滿後姊妹相伴專心致志於淨業過午不食持戒愈精嚴雲識字不多而於經中文義輒能了了每聽說法盡能領會念佛不求多念時必字字清晰勸人念佛必以心口俱念勿雜妄想並將功德回向淨土為言其對檀越惟以為善戒殺清心持名為勉不及其他民國二十五年三月朔雲起獨早即登殿念佛時天猶未曉念未數句忽見三聖像同時大放光明急起至像前頂禮無算旋退歸原坐念佛如故逮徒衆起雲乃率領課誦課畢衆請進早餐雲搖首告衆以所見並云淨土因緣已熟即今便當西去衆見其強健如恆未敢信雲從容沐浴更衣然後合掌趺坐念彌陀經至第九遍忽一笑而逝得壽六十八臘四十七其姊定華先雲兩年示寂臨終亦瑞相圓滿蓋其功行初不亞於雲也一九二民國泰縣福善庵尼果願傳附常清傳果願字本悅東臺徐氏女母曹氏早歿父芷江勤撫之年十二有出俗志上命不許祇作淨信女居家修持然出塵之念不稍渝年十六自翦其髮截左手小指並割臂肉以自誓父為駭動知非世網所能攖善言慰喻遣往江都磚橋放生庵事刻經僧妙空大師而披削焉入庵後日夕禮誦無或倦容次年往金山求具戒後還庵精修年二十九妙公圓寂徒衆雲散願偕師弟常清同心化導隨緣益物泰縣城內有福善庵凋敝荒涼數椽不支願偶過其地默為心傷問之常清常清曰兄若能慨任住持弟當輔而興之於是進院安住互勵苦行歷二十餘年清齊一食戒德無虧卒獲殿宇莊嚴金容燦爛雖資十方檀信共力護助使非道德潛為感發則善緣寧自集耶願功成不居行持彌篤數度掩關密得受用每日念彌陀數萬聲更發願禮大般若經六百卷是經文長意廣閲讀尚難而願持之以久行之以堅若不知有歲月者至年七十不復出關長精淨業兼修止觀內證淺深不以語人人但以大心之士稱之民國二十四年壽八十四略示微疾口中默念不絶人有來問疾者目之而已不為交一語至六月二十四日圓寂室中聞有蓮香事傳遠近皆稱異焉一九三民國宜興海會塔院尼覺明傳覺明紹興世家女俗名丁寶珠畢業於上海城東女學文科秀慧賢淑為同學冠五四運動時嘗為該校出席上海學生聯合會代表初與鑑湖秋俠善共唱革命秋俠殉難即代長協濟會因清廷提捕急乃遁跡春申專志學佛蓋在城東時校長楊白民教員李叔同皆以學佛稱校中女生受楊李感化頗衆其中尤以明為最誠明博學能文深知經義既得楊李訓導愈通曉佛法後李叔同於武林剃度即弘一律師也明為詩送之復於假期親往叩訪遂發心為尼民國八年卒業後留校任教務常以學佛勸諸生一時發願出家者頗不乏人自則持齊念佛日閲經籍屢請於親願聽許為尼再三苦求終不蒙允可然明持志已決念光陰有限生死事大昔世尊為求道法亦嘗背親出家乃毅然於民國九年秋遺書留別家人親友與其妹同遁至常熟雨花堂依妙參禪師私行剃度既落髮具戒現比丘尼相始返里省親求恕自是一心修學並至武林等處各庵參訪勇猛精進不遺餘力民國十三年掩關於上海圓覺庵十五年四月八日圓滿恭請諦閒法師說法啓關男女居士到庵護法者有王一亭施省之狄平子等百餘人出關後親近諦應二老深究台賢宗旨時妙師住宜興海會每往修省授以六部禪法及妙師示寂追念出世之恩結茅守塔三年風雨凍餓淡然若忘禮誦之餘探討楞嚴能背誦正文科判綱宗期滿到處宏法提振末學二十六年春聞四明張聖慧女士於奉化創辦法昌佛學院瓶鉢而往一見以道義相契即於學院開講楞嚴令每人各依一種注解先講演一遍明則披剝其瑕疵抉擇其是非採取其精華補充其不足以圓滿其說復任學員徵語辨難妙義重重泉涌瀾翻由名相而教義由教義而宗趣窮源竟委曲盡其奧聖慧時叩以禪旨偶一不契則痛罵熱喝不稍假往來敲唱偈語成冊衆信士欲請為法昌住持明曰住持一事余於諸方卻之屢矣汝等擬桎梏余耶余臥榻住久尚思遷移恐境界太熟而生留戀想也卒掉臂不顧明冬不圍爐夏不揮扇不赴宴會不看雜書渴飲晨盥皆用冷水孤懷凜凜罕與其匹七七事變前勸聖慧同隱峨眉聖慧不從乃獨自至蘇州居鄉間小庵二十八年五月示寂一九四民國新安靈雲寺尼能修傳能修順德人年三十五於新安觀音山靈雲寺出家志切朝山不憚跋涉國內各大名剎強半有其足跡初於民國八年率徒等五人由上海乘船溯江至南京渡江後步行經安徽江蘇山東河北四省而至北平居彼中兩月繼續向西進發身旁既無分文亦無乾糧沿途乞食經河北山西禮拜五臺復由陝西西安穿行四川全省親拜峨嵋雞足等山初聞五族之西藏為一佛教國上自政府下及人民無不信仰崇奉漢人因其道路窵遠言語隔閡往來者絶少能修羡慕之餘誓欲一覘其實當其發足之先群來勸阻語極危聳能修飭從者五人掩耳勿聽曰毋亂爾心遂取道打箭爐西向拉薩前後所經不下七十餘站由國民軍聯軍總司令部蓋印于其度牒以便通行川軍楊鄧諸軍長雅安道孚康定爐霍稻城甘孜各縣知事四川西康兩省佛教會會長均於其牒後署名途中大半步行間以牛馬土車代步渡水登山均皆赤足經過不少繩索橋梁橋長數千丈只容一人行走懸空繫置甚為危險經過藥山滿山皆藥過者多氣呢不能進修皆冒險闖過至雪山時雪深及膝數日不見一人一屋從者畏泣能修挈長徒冒雪獨先不稍反顧夜則擁氈踞地晨起視五人猶在仍賈勇而西既至拉薩達賴喇嘛嘉其萬里來朝聖地親自接見頒給拄杖長約英尺五尺六寸為烏木所成雕刻極精文彩耀目與真金無異能修與徒參訪頂禮學習藏語及藏文經咒在彼略住於民國十九年仍步行經西康反川行至湖北宜昌為怡和公司襄和輪船執事所知特豫免費載能修等到滬至一尼庵暫住問其歲已六十二矣最少者二十五六時威音佛刊社聞彼等苦行特往訪問延至社中請彼演講能修因述豫中年出家因深感女人痛苦發願廣度女界同胞是以遠涉山海訪善知識豫固不識字者常自普陀負六十華嚴北登五臺既不能誦讀乃於佛前涕泣長跪一旦若有悟焉遂得溜覽竟業并誦法華般若金光明諸經西藏之行亦可謂得無所得勝事機緣不一具述豫本欲留藏不歸二三同行謂如不歸有違初願今經滬上稍事拼擋仍將入印豫有切勸與諸女人者以豫經歷深信女人必能成佛雖云女人多障亦不過要女人發大心耳亦唯女人苦惱多於男子故女人發心必誠切於男子女人當自念其苦發心亦自必誠切云云能修後至西安西安久無尼僧叢林官紳居士議改東關罔極寺以為之倡欲擇有德臘者主之衆以非能修莫屬遂於民國二十四年三月一日公送入院能修既任住持首即率衆結七士女隨喜者甚夥各方對之均抱好感預料前途將有更大之發展尼僧之綱紀必倚之而獲振也一九五民國江寧保國庵尼識參傳附月華傳識參字修慧宛平陳氏女父松庭家世簪纓有兄妹各一光緒初年時以入都引見舉室北上旅次金陵下關父染疾而卒母魏氏動循矩法素具道力修持有定課更擅岐黃術設室凡來就診不論男女老幼皆導以佛法諸善信供養所得則取資貧寒賴以舉火者實繁有徒後無意於塵事決志芟染法名月華於金川門外寶塔橋荒廢庵基自建保國庵一心念道閉關二十餘載之久關高五尺餘寬深約二尺餘終日靜坐習定苦行昭著參幼受家教早解經義稍長懇求披剃乞具千華律院期圓之後歸庵盡孝養職及母中道逝世傷感於懷師弟修淨諳於內務益以董成門庭重責有難擔荷不得已接替住持愈益奮勉拈勤儉二字為訓勗勉徒衆佛課之餘治理雜務嘗曰古來大善知識尚且一日不作一日不食余輩何人敢耽逸樂須知操臼井灌園蔬下逮米鹽瑣屑補浣漿刮無非般若實相親切功夫豈盡在蒲團禪板間哉辛勤既久漸有餘裕了先師志願建觀音殿伽藍殿又添造市房五拾餘間並陸續置田數百畝氣象蒸蒸冠冕一境時清社既屋政體混亂新舊遞更外人乘勢侵入競設商鋪攫取利權一般昧良之會長總董輩為金錢麻醉不惜喪失人格供其驅使甚至擅作威福壓迫民衆民國二年有英商和記洋行以庵址及庵塘三面環邇該行擬吞合為一遂萌覬覦庵産之念買辦期於必成因以亟加煎迫英人紀大阪更迭加嚇詐逼令拆屋讓地參素具識略不為所屈一再辨之以理彼遂怏怏而去嗣竟變本加厲強拆庵房三間鋸樹灌水屋瓦且為水力激射四散其徒等恪遵師訓舍生維護庵産行方欲臨之以兵雖未為所劫然其時殘暴不仁之象可以想見地産經理周匯川以庵址庵塘未得就緒心有未甘復為虎作倀與地方士紳龍永成等設計進行以必達其完全目的為願時永成之子與江寧縣長左有金蘭誼風雲際會炙手可熱先是地方人士屢擬盜賣庵塘究以呼乏將伯有所未能至是乃相慶彈冠對庵方則由縣長親臨威嚇迫使就範對庵塘則由縣長批示許可准由伊等出賣無不得心應手滿意挾雷霆萬鈞之力自可為所欲為然參以先人基業何可委棄力排萬難訴之交涉使並地方法院各機關其時當道有主張公道者有懾於和記勢力者表示遂各有區別主張公正者則一秉大公其他迭次催請審理不加聞問者有之勸參出售庵産者有之甚至惱羞成怒將預審終結庵塘收歸國有者有之相持多年卒也撥雲霧而見青天最後判決將原塘發還盜賣庵塘者判處徒刑六月執行六年之久始得告一段落民國十六年北伐成功新體機關賡續産生有所謂農民協會者誣指南門外曹馬村自置之庵田內七拾餘畝為占自民家江寧知縣周浩不察始末認為尼衆懦弱可欺令參賠償三千金參不服立下諸獄乃紛呈各機關呼籲逮經特種刑事法庭時始辨白真相如此數十年涉訟計達五十五次無非保持庵基田産之安全而已同時世風之惡人心之險於此可以概見二十六年中日戰事暴發京滬沿線居民紛紛避難流離失所參本佛陀救世悲心組設下關寶塔橋紅萬卍字會難民收容所先後容納老弱婦孺一萬餘人維持百餘日始解散聞者皆義其事參更領導徒衆每日諷誦經典超拔陳亡將士以及罹難民衆冀其仗承佛力出離苦海棲霞為六朝名剎洪楊之後得法意宗仰若舜諸上人興之若舜之嗣有寂然者盡心職守行所難行嘗為護持山地搆怨於鄉村師範及不良之徒致身經七番冤獄參以其平時於寺方工程之監督人事之調整亦已煞費苦心維護寺院又遭此顛沛苦境對之深致欽佩故於中頗效奔馳精神物質之犧牲皆所不計即以棲霞寺購田所需由寂然請由參所經手代借之款不下數千金復勸信士陳海清施莊田地等二百餘畝自亦施莊田地等二百六拾餘畝永為常住海衆齊糧三拾年春山中擬舉行戒事以食糧之缺有所未能商之於參乃為助米五拾餘石以玉成之寺主明常和尚感其護教熱忱除已於白乳泉上為卜壽藏並庵中尼衆塔地兩處外更擬請名筆著其事於貞珉用垂不朽參年六拾餘精神強健願力宏深將來所建事業仍未可以限量也一九六民國泰縣靜修庵尼本道傳本道泰縣羅塘王氏女幼聰慧舉止間雅能博堂上所歡二老視如寧馨兒對之頗抱奢望利其稟賦擇師課讀不煩督策而自警惕以其餘兼習女紅比肩嬌小皆不如也年及笄媒妁禮成未嫁而夫壻夭折道即毀容盡哀要求過門守節家庭力阻之不獲明其素襟於是裏衣悉易粗麻短其髮投邑鄉之靜修庵與香火為緣父母不忍重拂其志恣其所行道聞之沾沾自喜即於佛前圓頂披解脫服矣入庵之初尊師重道矯然自拔終日修禪作觀唪佛持經每至油乾香燼猶未就寢所居一室供事聖像晨夕禮拜維謹維勤歷數十年足跡陷地深入寸許傳者互驚為異競來瞻謁尊為優鉢羅花誠為希有之瑞也先是庵之殿宇年久失修金容亦復殘剝民國六年道盡出撙節餘資召集梓塑會工修理檀信多樂為外應獨其師洪樂老耄昏瞶性情磔傲見其土木繁興竊加非難然亦不能言之成理雖欲阻撓無辭可藉惟目非而心銜之輒恃名分之尊遇以非禮甚則焚香誦經之際猶復指桃罵李以亂之道裦如充耳奉事如故里人咸稱其孝至於行苦之篤建造之功則又足以感愧如來之稗販矣一九七民國上海龍音寺尼能圓傳能圓字慧明上海人自幼信佛年十六茹素三十六剃髮時浦東一區佛法凋零信向者少有妙心禪宿杖錫來化曲垂導引剖示念佛法門每集衆開講言存激發剴切動人因之投誠皈依者與日俱增圓受薰陶即依披剃宣統元年建東興庵民國三年春至鎮江竹林寺法舟和尚座下受具六年又建金匯庵獎勸諸善女人切志學佛嘗曰生死吾人之大敵也一切衆生皆久困垓下若不堅苦行以為鎧甲勤修持以為戈矛欲思突出重圍必不可得晚年建龍音寺道聲籍甚二十六年秋後示疾八月十九日寂壽六十二一九八民國上海慈修庵尼諦參傳附道願傳諦參字永薰香山黃氏女弱齡父母鍾愛因其好食乳雞每餐必為具之習久成慣初不覺其非一日倚枕午睡矇朧中墮入水溝身陷淤泥將欲自拔忽有無數乳雞來啄其體驚避既不可能呼救又難出聲嗚咽掙扎半晌方醒怔忡之餘深悟因果循環報應不爽物命雖微含冤則一從此非但不食乳雞並禁絶其他魚肉而萌出家學佛之念適有江蘇尼道願大德雲遊過粵與其母雅有舊誼暫寓其家參默喜因緣成熟直白其情雖經父母呵斥親族規勸終不能阻其勇往之志遂於數日內略事拼擋遍辭親友侍道願大德之錫而東光緒二十一年春年二十一往金陵寶華受戒期中聞得戒浩淨長老及闍黎大霖律師開示法要極有心得乃發菩提心遍禮名山參訪知識二十三年止杭州法藏庵被選為住持歷十餘寒暑領衆焚修化導閨幃復兼住城內清蓮庵斯時民軍起義人心惶動參惟率衆行持使同住道侶鄰近婦孺皆一心向道度險如夷由是自邇至遠談佛門近事者莫不知有法藏庵主其人焉民國十三年年五十歲移錫滬上受請住慈修庵修理房屋整飭紀綱精神視昔有加自課專誦蓮經一門深入終年不懈遇有以佛法請者隨舉經中一句一偈為之巧譬旁解頭頭是道雖寶座中人未易過也徒衆心一等默受身教咸循軌範二十七年四月參以疾而臥正念自持毫不呻吟口中仍念法華不輟至初七日命取所誦法華置案前直視不瞬移時而寂人皆謂之默誦未終為欲對境提撕以盡其卷者亦有謂之對本作觀而證取法華三昧者要之最後吃緊關頭心無惑亂非平時工夫得當決不可以強致也時戒臘四十三俗臘六十四一九九民國武進淨觀庵尼天正傳天正一名宏嚴字雲開靖江鄭氏女母黃太夫人艱於嗣及得正珍逾珠玉聞諺稱有慧而難永之說隱以為憂商之姨母勝林上人願捨輪下歸敬福田勝林主武進圓通庵持律重道見正舉止閒靜卜為法器試曰汝年幾何答曰六歲林曰汝何以肯離生母而來依余答曰佛有前例某故效之林曰佛有生母見背故依姨母汝今不同其意何在答曰姨母處有佛法願就學焉林頷之極意撫育先在鄉孰課讀因無良師復寄淨觀庵託澄照上人代為教誡民國八年年十九往鎮江焦山乞具其母見兒出家圓登戒品道念精純認為人生第一快事每沾沾自喜一日偶遊武進北鄉三元寺若有所觸力求寺主剃髮身心精進無間朝夕二十年發心圓戒二壇未畢而寂時正護戒焦山不勝悲痛長跪諸闍黎前懇修懺法代圓篇聚火餘拾骨安塔黃山人皆稱其孝正久親應慈講主聽習華嚴圓頓法門悟解玄旨為人演說儼然日光園中一會未散後受澄照之法主持庵務改造山門修理廊壁闢念佛堂率衆行持並掩關三載禮華嚴大經全部自誓一俟時局平靖更朝禮諸大名山云二民國青陽心安寺尼觀願傳觀願字佛行海澄人俗名秀霞楊先烈衢雲之季女衢雲因奔走革命遭清廷忌逮之甚急乃挈眷居日本光緒二十五年生願于橫濱年十歲回籍入庇理羅士女書院肄業常因病曠課於學無進既而其父為人狙擊殞命重以家境蕭條遂爾輟學然願讀書之志頗堅不肯自餒謀投實踐女校修業校長以其為革命遺屬免納學金願既得受課識解卓絶秀出常人每念生父以身殉國未成碩果輒為之嗚咽不置默以木蘭雲英自期許年十九母氏潘卒後兄佐治亦相繼棄世煢形踽步不勝淒涼之感先是港地多耶穌教會願往聞之未愜於心及聞佛教典籍言理精闢且有一子出家九族超生之說心懷嚮往於是日以香花之屬供禱大士之前至誠發願默祝早遇明師成就出俗因緣如是者三年歷訪諸方名宿請求法要解悟日深然時俗以學佛為恥於出家事礙難出諸口間有宴會唯擇蔬而進不忍涉及肉味戚友有疑之者則以素食衛生對民十一年二十四持志已決作辭婚詩云提起神鋒劍太阿情根斬斷出虞羅親恩未報肝腸斷青磬紅禮佛陀乃于九華文殊峰心安寺乞智妙禪師剃染翌年至寶華具足效古人行腳囊鉢煙水之湄親近弘一律師暨諸名德曾于香港佛學會任通俗演講兼義學教授蓮花池講小本彌陀并編製四分律比丘尼戒相表記二十六年中日事變竄身心安祖剎任監院職禪誦之餘經行溪谷幽巖花放古樹禽啼不覺觸發吟思天然成韻冰清雪潔有越徹遺音數年之間青陽士女歸信甚多謂其不但以學識見長其行苦精修尤為一般尼衆所不可企及云板存鎮江竹林寺樂助功德芳名南亭修慧心一靈珠純淨清修各一佰元若舜陸拾元雪煩伍拾元脫煩肆拾元印慈昌緣各叁拾元文心幽棲寺融慧萬昌潤徐昌寶萬昌蓮卓成明常慧量雲開陸常進何寬喜昌儀昌持昌習源根密厚張易軒張淨和超塵各二拾元昌極二拾伍元郁華拾伍元炳蓮拾二元彭順昌彭果慶吳煦培吳莊氏吳慶恆吳徐氏吳淨善吳滿渡朱蕙珍丁吳氏吳元章吳鼎臣吳周氏朱伯衡朱陳氏丁沈氏共助二佰叁拾元祖珍卓雲陰華妙華海定永清虛崖純修法光慎之慧量道根慈忍阿檀覺深卻塵王寶量楊志聖金常淨了慈祗樹昌琳蘇數慧志寬各拾元自新慧禎昌真朗德昌誠道心昌恆成明淨紅昌星周淨亮周朱氏黃玉瑞各伍元候梁氏陸梁氏共伍元靜香肆元黃玉琳叁元天智如慶波尼淨橋隆雲智明昌志昌慧慧圓觀元覺道了音善慈寬慶道性持印劉心祥通政妙如仁寬昌其昌勝楊七太太各二元根慶達正達嚴林禪淨慧廣法忠華敬可仁持松山心悟果林福鎮本定本量惟善覺順悟心優祥了生瑞霞風慧靈祥金道大曹福壽黃慧祥各一元逸溪祥星無名氏各伍拾元復善庵叁拾元淞泉育枚智開志德各二拾元圓湛圓覺楞鏡淦泉靈潔月川各拾元以上連圈計共七萬四千一百四十一字願以此功德普及於一切我等與衆生皆共成佛道民國三十年四月開刻至次年二月刻竣續比丘尼傳跋觀夫宇宙之內即物成象萬類森然雖有聰敏睿智猶不免恍惚迷離況更竪窮源流橫徹邊表能一一體究之乎古人記之以書類之以史不過僅就知者而言其為耳目所不及者當不知其幾佛法流入中國已歷千數百年其間門庭施設宗統傳承皆有史傳可考獨比丘尼自梁寶唱法師一度採訪編集而後迄未有人續纘其緒吾師震上人覃擘經籍留心掌故為欲繼往開來爰有倡修續傳之議丁丑夏書成忽發現施蟄群先生於學生雜志發表黃心大師一文引言謂北平某藏書家庋有明鈔本比丘尼傳八卷因喜視塵曰此八軸靈文非繼唱公而作乎如能設法借得余書將改製矣或仿石埭居士僧傳之例而以初二三集別之時適淞滬戰事暴發未及調查而夾山藏書皆燬於火傳稿又為一同學攜失於途嗟夫尼門文獻可徵而不可傳大法其將衰乎且喜吾師深浴教海才智兼人平時逆推往事如數家珍當屬此稿又復三致其意印象之深如鍥如銘塵不忍埋沒此段光明一日山居無事乘間理及此案並以重輯請結果仰獲慈允命筆追記終以收藏損失購借兩難每於一傳只能憶其名而不能證其文為此問題橫梗於前不覺延長歲月直至今日始能樂觀厥成其經歷之難用心之苦惟塵等朝夕侍座知之故略述因緣於後並有二事敬告一凡讀是書者當作難遭之想勿生輕慢二吾師繼是書之著關於比丘尼者尚有三種皆在稿中如遇因緣即可問世云民國三十一年二月得度弟子超塵敬跋於常熟三峰
