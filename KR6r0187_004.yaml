瀛曰莫怪從頭多意氣他家曾踏上頭關璧微笑一日解制上堂瀛問結制解制古今條例不解不結意旨如何璧曰昨日熱今日涼瀛曰還有不涉寒暑者麼璧曰洞庭出沒碧波中瀛曰可謂頓超千聖外直透古皇前璧便下座瀛隨至方丈問如何是佛法大意璧曰試道來看瀛便喝璧亦喝瀛又喝璧便打瀛禮拜頌世尊拈花曰靈山密付是何心引得頭陀眼欲昏不獨燈籠驚喪膽管教露柱也消魂一一二清湖州靈瑞庵尼濟苻傳濟苻字祖揆湖州李氏女具大智慧出家靈瑞庵從蘇州靈巖退翁儲公得法一日到山禮覲儲曰有人問靈巖佛法你如何抵對苻曰爭肯觸忤和尚儲便喝苻曰實謂今古罕聞次日辭行儲曰昨日公案還記得麼苻曰某甲只解瞻前不解顧後儲曰何緣得到與麼田地苻曰深領和尚一問儲曰原來忘卻苻曰不道只是禍門上堂西風一陳來落葉兩三片狼藉祖師心匝地無人見常履踐芒鞋步步踏黃金佛法原來如土賤又村庵上堂一幅酒旗風數點杏花雨村路少人行祇只黃鸝語竹籬茅舍別是乾坤石室蒲團渾忘今古富貴不用誇矜貧賤何須愁苦何故好信騎牛勝跨虎著有祖揆苻禪師語録梓行一一三清崑山靈峙庵尼濟印傳濟印字仁風崑山顧文康公從孫女得法於退翁儲公住玉峰靈峙庵上堂老胡於正覺山前無端捏目生花引得四七二三華言梵語紛紛紜紜二千年來費盡許多生受更無一人為伊勦絶而今把柄落在靈峙手裏普天之下誰敢道個如何乃顧左右曰且道靈峙著甚緊喝一喝曰劍為不平離寶匣藥因救病出金瓶小參靈峙二十年來橫草不敢拈竪草不敢踏任是諸方鬧浩浩時我這裏只是靜悄悄地一時錯腳踏入靈山會裏被現坐道場這員古佛將個無文印子面門一劄直得通身是手拈不下通身是口道不出冷地追思祇合慚愧顧大衆曰祇如節文在甚麼處衆默然印曰今日失利一一四清嘉興妙湛庵尼濟總傳濟總字寶持嘉興金氏女隨州太僕之冡媳夫亡脫俗於妙湛力參有省退翁儲問趙州洗鉢盂話作麼生總曰賴有行者在儲曰爭好倚重別人總曰若不如此誰知不分內外儲頷之住海鹽南詢上堂十八上解作活計的一頭水牯牛無處著落代曰遞過索頭來又曰十八破家散宅的因甚七斤衫子至今卸脫不下代曰久矣無人説到這裏示衆舉俱胝和尚凡酬人對祇竪一指示之總曰俱胝一指頭千古曾無對可憐懵懂禪至今不瞥地若瞥地萬象森羅無出氣一一五清蕪湖太平庵尼玉恩傳玉恩字一真山陰王季重女也年三十禮愚庵盂披剃受具得法於本充盛住蕪湖太平庵上堂法無定相隨念變遷佛無定形隨機應化語若迅雷不容掩耳機如掣電豈許停思八臂難敵千眼難覷可奈禪和但知幻之為幻不知非幻之幻但知非幻之幻而未知何為非幻轉急轉遲目視雲漢大乘井索小乘錢串喝一喝下座一一六清杭州清涼庵尼超祖傳超祖字覺悟杭州趙氏女虛舟省嗣住清涼庵示衆舉南泉賣身因緣祖曰南泉只知索價不顧瞻前者僧雖解瞻前不解顧後祖上座當時若在待他道不作貴不作賤你作麼生買便與三棒何故心不負人面無慚色出關小參開關原是閉關人一度拈來一度新八面玲瓏明似鏡十方世界現全身一一七清當湖善護庵尼超見傳超見字一音姓戈氏適沈以疾謝投伏獅院祇園剛披剃看萬法歸一話有省剛問如何是有物先天地無形本寂寥見曰到家何必説程途剛曰如何是你到家消息見曰仲冬天寒請和尚珍重剛為印可出住當湖善護庵有百丈再參馬祖因緣頌曰春花爛漫柳隨風泊岸漁舟解轉蓬鏡裏山河原不別一聲孤雁落長空又臺山婆子頌曰婆子臺邊弄釣竿風流脫體幾多般不因趙老來親看往往行人被熱瞞一一八清嘉興參同庵尼超琛傳超琛字一揆嘉興大司寇孫簡肅公之曾孫女仲兄子麟少年得道登三教壇琛幼聰敏不由師傳而通書義兼善繪墨及笄適盛盛遘疾不起思為出世計自後毀容變服茹素焚修立志堅貞其兄子麟見琛心切語之曰待吾拼卻性命倘有所悟汝不難出世也奮身打七大事得明即告琛曰汝急做工夫絶後再蘇欺君不得琛晝夜參究話頭難破如吞鐵丸愈疑愈悶一日同母夫人參謁伏獅剛一見稱為法器是冬結制坐至二七忽爾定去香盡四炷瞬息而過大地平沉洞徹本來面目其兄聞之笑曰這不唧𠺕漢遲至今朝方摸著鼻孔何鈍如之剛即為披剃印可出住參同繼住伏獅康熙己未春抱微恙至六月絶粒飲水至示期七月初三立秋永別初三黎明先期報鐘琛曰又擔閣我一日初四日辰時沐浴更衣説偈曰這漢一生骨硬如釘一處轉腳最難移根二十四上知有此事十年克苦忘形四十九上憫絶娑婆世界覷得世態如冰實求早離如願業緣又使七春目今葉落知秋正是歸根時節呵呵呵逍遙惟我端坐而逝世壽五十五僧臘三十一一一九清吳興蕭山庵尼超具傳超具字天一旅庵月嗣住吳興蕭山庵頌馬祖玩月曰十分光彩一輪圓説得分明總枉然供養修行拂袖去何嘗夢見祖師禪頌靈雲見桃花曰春來桃李遍天涯添得靈雲眼裏花今古無能辨端的半疑半信是玄沙頌香巖上樹曰全身上樹儘風流祖意西來話未周不得旁人來救取看君懸到幾時休一二清杭州雄聖庵尼超越傳超越字靜諾杭州林氏女幼出家於雄聖庵依惟極致為師往來雪竇之門一日侍立次致舉洛浦見夾山因緣汝作麼生會越進前一掌致曰切莫捋虎鬚越曰蒼天蒼天一日隨衆入室致曰古人道諸方只具啐啄同時眼不具啐啄同時用汝諸人作麼生用作麼生會衆無對越噓兩聲致曰未在越曰齊和太平歌越工吟詠有憶惟極師云冰雪家風古蕭然丈室中當年親教誨數語發愚蒙生死恩難報箕裘愧未工妙峰還掬土道範邈何窮一二一清丹徒正覺庵尼超元傳超元字佛機丹徒人嗣法鶴林中朴隱住正覺庵有竹篦子頌曰拈起吹毛劍魔佛皆膽戰擬議問如何雷聲轟閃電又趙州勘婆子頌曰勘破婆子公案兩重山崩地裂杲日當空又臨濟見僧入門便喝頌曰鐵牛踏破澄潭月石虎巖前吼不徹黑漆崑崙沒處藏百獸聞之皆腦裂一二二清鄞縣薜蘿庵尼慧空傳慧空鄞縣王氏女三十三歲辭俗出家於薜蘿庵初參念佛底是誰苦無入處因參天童奇問磐陀石上珠一顆無去無來不見蹤請和尚直指奇曰説底是誰空沉吟奇一喝空大起疑情歸途遇一老宿問如何是本來面目老宿曰禮拜的是誰空於言下頓悟遂述偈曰四大浮囊假借因拈香撥火阿誰親從今爍破娘生面大地山河一統平又曰本自無心物自間通身混露祖師關俄然一念超方外水自水兮山自山一二三清真州大慈庵尼超濟傳超濟字桴海真州人得法於揚州建隆法音滐公住大慈庵上堂學道應須達正因道源曾不隔微塵當知一切衆生界即是如來正法輪滐長老截舌去也衆中還有相救者麼喝一喝下座一二四清蘄水增福庵尼兆地傳兆地字聖拙住蘄水增福庵初參山鐸在公親依最久一日問未離兜率已降皇宮未出母胎度人已畢今日和尚為阿誰在瞪目視之曰誰謂汝是箇人地便掩耳而出在曰三足蝦蟆飛上天地住庵事母二十載不下山學徒來參開示懇切大有古德遺風一二五清武陵筠庵尼隱慧傳隱慧字象庵武林莊氏女出家筠庵一日閲三峰語録有人以生死不了請開示峰應聲便掌慧於句下有省遂成頌曰四十餘年業識拋驀提寶劍逞英豪喝教倒退三千佛大地全收在一毫後見淨慈豁堂嵒問作麼生是菩提路慧曰入地獄如箭嵒曰寸絲不挂時如何慧曰負心人越窮嵒曰如何是差別智慧曰三九二十七嵒曰還有便也無慧曰三九二十七嵒便休有食筍偈曰久隱深山保聖胎一聲雷動出頭來層層剝盡蒸來喫不負親嘗者一回一二六清江都拈花庵尼上融傳上融字靈璽江都人胎素天秉剃染於拈花庵謁天寧巨渤恆領參竹篦子話久而徹悟恆問前話融曰水向石邊流出冷風從花裏過來香恆曰直須拋過一邊始得融即呈偈曰此事分明在目前何須向外覓生緣重關擊碎清風起慧日高懸遍大千恆頷之冬至小參孤風凜凜孰堪誇佛眼何曾著得沙妙用坦然神莫測鉗錘毒辣有分拏一聲哮吼驚天地突出威音遍界賒今日分明重舉似一毛頭上定龍蛇且道如何是冬至一句以拂子揮一揮曰但得雪消去自然春到來一二七清蘇州古滌庵尼契蓮傳契蓮字慧照金沙孫氏女年十九白父出家於蘇州天池古滌庵剃染謁揚州天寧巨渤恆公言下知歸得蒙印可有世尊升座文殊白椎頌曰法王法令是非關多少行人著眼難雨後花殘春寂寂青山只在白雲間又南泉斬貓頌曰斬貓機用誰能委草履拿來費力多只向低頭舒一笑任他伎倆自消磨又俱胝竪指頌曰俱胝一指莫疑猜已是和盤託出來漫道作家無禮數酒濃原不在多杯一二八清無錫龍護庵尼道遇傳道遇住無錫龍護庵受法檗庵志除夕示衆山中無曆日寒盡不知年此是陳年語話烹白牛分歲閣拄杖過年乃是諸方葛藤喚沙彌曰換水添香著山僧今日要與諸人應個時節雖然如是猶是衲僧家常活計且道格外提持又作麼生乃喝一喝曰特地爆聲震裂各自惜取眉毛一二九清荊州延壽庵尼明本傳明本字上機魯山人姓金氏禮天王寺水鑑海披緇受具乃以本參話頭不明每自泣下一日問海曰如何是一歸何處海曰師姑元是女人做本便喝海曰青州衫又作麼生本提起衣曰此是破羅衣海印以偈曰百千三昧何為本彈指門開非上機喜汝眼睛端的處青州衫換破羅衣住荊州延壽庵以禪道化人一三清永嘉白塔庵尼明光傳明光字照清永嘉相國張文忠公孫女十三歲為父死難即持齋誓不出字二十四剃染於白塔參仙巖天目智和尚一日呈偈頌智曰偈頌且止你將公案説看光進步默然而立智曰囫圇吞棗光曰千峰勢到嶽邊止智曰萬派聲歸海上消又作麼生會光退步默然而立智休去示衆一棒一條痕一掌一握血辣手不容情祖師真妙訣識此訣生死徹擲下竹篦曰惟此最親切一三一清瑞安雙貞庵尼敏敬傳敏敬字通禮瑞安人姓陳氏係林眉聲堂嬸也矢節焚修眉聲令參如何是祖師西來意庭前柏樹子恁麼會又爭得如何是祖師西來意庭前柏樹子恁麼會猶較些子久之未有所入偶閲冰輪道者柏樹子頌有省上寶寧求證紫芝有有曰祇如趙州道狗子佛性無又作麼生敬曰謝和尚證明有曰既是無又證明甚麼敬曰惟人自肯乃方親有曰汝猶未徹在敬禮拜便出康熙庚午二月二十日對衆説偈坐脫
