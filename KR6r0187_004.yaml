body:
  text: 民國京口夾山沙門震華編述八八清白下某庵尼靜照傳靜照字月士宛平曹氏女為前明宮人李自成犯闕隨內監劉至白下乙酉後遂祝髮為尼道念精純為人所重著宮詞百首茲托其六於下到面春風只自知燕花牌子手中持椒房領得金龍紙敕寫先皇御製詩一樹寒花冒雪開幽香寂寂映粧臺女官爭簇傳呼近知是鸞宮選侍來寶妝雲髻嚲金衣嬌小豐姿傍玉扉新入未諳宮禁事低頭先拜段純妃口敕傳宣幸玉熙樂工先候九龍池裝成傀儡新番戲盡日開簾看水嬉閲遍司農水旱書君王減膳復齋居御廚阿監新承旨來日羹湯不進魚儉德慈恩上古稀他方織錦盡停機赭黃御服重經瀚內直才人著布衣八九清江陰敔山庵尼通光傳通光字悟徹江陰人姓繆氏楊振陵室大覺玉林國師母也振陵行雲棲之教法名廣馥先卒國師年十九投宜興磬山天隱老宿出家既得法已辭歸省覲磬山示偈有汝親見得箇中圓白髮也須翦卻了之句及後磬山示寂囑國師主湖州報恩法席其母果思入道國師仰承慈意於江上十方庵磬山像前為母芟染秉具迎歸報恩草堂奉養一如東山周母之白蓮峰故事國師有偈云修行在行不在説萬事應須猛割截這回似斬一握絲一斬一切俱了畢頂上圓光含十虛從今更不重埋沒非是山僧輕度親十載先師曾記莂剎那具足丈夫儀法名通光號悟徹不向他人行處行管教步步蓮華國自是弟子皆呼為太師母國師每展禮必反拜殷勤取佛制人子出家父母不得坐受禮拜之意於其他僧俗亦然至於朔望不開扉新正半月靜坐不見人蓋避太師母之尊以免勞人敬禮也江陰有敔山庵亦時往來住止精修十餘年研窮至理深有契證不自炫耀卑以自牧順治十年癸巳十二月十六日示疾而逝世壽七十一尼臘十二葬於虞山藏海寺後塔曰大慈九清廣州嚴淨庵尼等齡傳等齡廣州番禺人俗姓鄧母洪氏大清初出家晨昏禮誦翹志淨土稱念大士洪名不輟於口於順治庚寅年七月二十三日禮念至中夜四壁寥然惟自一身恍如掌中有物不覺將納於口咽已開拳尚餘三顆在手其色鮮赤形類硃砂自此絶食了無飢渴禮念猶謹次後稍餌時果而七穀不沾唇膚體如故精神較健住廣州嚴淨庵九一清嘉興伏獅院尼行剛傳行剛字祇園嘉興人處士胡日華女幼有至性好禪靜父母不聽所願歸于諸生常公振未幾而寡茹素奉佛誓欲了生死首參密雲悟時未脫白悟以鄭三娘目之嗣即剃染受具哀求開示痛切追究久無入頭復參石車乘悟乘二師先後主邑之金粟故得繼續問道乘令參本來面目不得透脫深加逼拶至嘔血數升不輟一日剃頭下單豁然開悟機鋒迅捷乘授以如意祖衣而記莂焉閉關胡庵九年應住梅溪伏獅院首闢禪堂創立矩矱森嚴峻絶法席儼然朱檢討彞尊嘗稱其威儀醇朴無論空門行業即以節婦論亦宜存其片言以當鳳樓新誡順治甲午八月示微疾其徒強進以藥剛拒曰老僧世緣已盡秋殘去矣九月二十六夜索浴更衣説偈而逝奉全身塔於伏獅之左世壽五十有八僧臘二十有三著有祇園剛禪師語録二卷入嘉興藏九二清常熟大河靜室尼潮音傳潮音姓金氏常熟大河人歸里中龔某孀居自誓儀法井井長子既娶辭親出家字曰定暉暉歿母謂次子端吾曰汝兄往矣吾母子何苦徽纏人世端吾曰諾遂棄妻落髮奉母入郡禮尼真如為師既而還里僦居焚修晝夜六時佛聲浩浩順治乙未正月示微疾二月初六日沐浴披衣堅坐中堂日晡時計曰人定亥時去矣斂手入神端然而化緇白男女聚觀禮拜填咽者數日建塔吳山之玄墓世壽七十三夏十五大宗伯錢牧齋為撰塔銘有曰豫觀近日宗門女戒鋒起闍黎上座林立鏡奩語録伽陀交加丹粉咸有尊宿印證支派流傳可羞可愍莫斯為甚是比丘尼卻避市廛遠離俗姓不唱參方之緣不挂大僧之籍一聲佛號十念往生旌表末法甚難希有斯則墨穴之電光狂水之聖藥也善乎徐波居士推言之曰世尊説法四衆同集法華會上比丘尼與諸大弟子等記作佛奄及末世以逮今時出頭露面幾成戲具盲參瞎仰斷送佛法又曰潮音師坐脫立亡臨終灑灑生前不炫弄不誕謾死時用得著也於乎敘潮音之事可使發心者勸録居士之言可使識法者懼居士作頌四章以告誡女人出家者余又何以加諸謹重宣此偈以代余銘俾端吾刻之塔上偈一曰紛紛恆化是何情習慣遷流每著驚若使生人真畏死須知死者復愁生偈二曰平生行履歷堪思捧盔披緇不弄奇畢竟臨岐談笑去是渠應得更何疑偈三曰去須明白莫匆匆仰視春星亥未終法法本來無動想頗于人定露機鋒偈四曰數珠百八舊前程士女相逢掉臂行卻是遺骸能説法朝來奔赴動山城九三清嘉興寶珠庵尼明修傳明修嘉興陸氏女年十五字於關為待年婦踰年關殤陸願守貞誓不去姑命以夫兄子為後已相安矣越三年夫兄忽欲嫁之數以微詞諷陸不得已歸父母夫兄仍與媒謀猝舁婚輿欲暮夜強致之陸覺而逸婚人揚炬大索陸輒覘火光轉徙得匿以免念姻家女有為尼孫庵者乃急走就之關猶索不已陸慷慨誓死族人有義之者為白其事於縣始罷後祝髮於寶珠庵明敏通曉世故有丈夫氣不僅以貞潔著也年七十九卒九四清會城某庵尼靜主傳靜主號靈虛閩人姓徐氏幼許里中楊氏子楊殤時靜主方數齡聞訃絶食欲從死父母訝其稚小也相與抱持強之飲食不可奪息且綴屬許其長齋捨身為尼然後稍稍進粥糜於是鍵一室制服服闋從老尼覺源剃染精進戒行六十年如一日年七十五念泡幻之身行將捨去卜會城北郭之五峰山建造普同塔為共住者歸宿之地九五清桐鄉某庵尼德密傳德密桐鄉人夫故即參內典誦佛書一日訪道叢林叩問禪旨某禪師示曰念佛者誰爾試參之人人有箇真如自性凡愚日用而不知汝於此能得究竟是可已密晝夜靜參一時領悟住庵行化四遠歸依得其心要者凡若干人年七十餘歲無病坐化踰日鼻垂玉箸頂放白光觀者如堵九六清廣陵某庵尼超一傳附涵光傳超一廣陵殷氏女早寡學道三年坐化遺詩偈一卷有云靜中無箇事反復弄虛空地老天荒後魂飛魄喪中有師開道統無法度愚蒙忽底虛空碎夕陽依舊紅又看花云土來澆灌水來栽顛倒工夫任我來滿院春風花自語不將顏色向人開漁洋山人王士禎為述其事以傳又言有尼涵光江西宜黃人姓鄒氏歸談大司馬綸之孫其夫椎魯不知書涵光棄去走京師上書請南遷不報會鼎革遂為尼每談胡明門戶事源流甚晰居寶應山人之友朱秋崖曾見之惜其道迹多不為世所知實憾事也九七清漢陽某庵尼心聞傳心聞住漢陽某庵年五旬志在持戒於順治十年二月中同徒等九人一帆不憚險遠投金陵寶華山見月律師座下乞求三月安居供米六十石銀二十兩見公觀其意誠切遂憐愍許之於設齋日不肯入堂禮佛齋畢見公集衆呼聞至前語云汝發心遠來學戒為何不進齋堂禮僧律制比丘尼縱年百歲當禮初夏比丘今自大慢僧非學戒者聞云某在楚中若有善知識處俱往設供方丈皆以客禮相欵並不禮拜見公云彼貪圖利養敗壞法門凡見有因緣尼敬如生母以望更得厚供是獅子蟲非真善知識也吾華山今雖淡薄寧絶糧斷餐必不敢違制邀利今日所設之齋作常住自用其銀還汝米在下院可將別去聞作無明會接銀領徒即下後山歇出水洞靜室有弟子古潭入室白云彼尼遠來常住空虛和尚且方便攝受一則不退彼心次則大衆有半月之供見公正色云但肯真實修行大衆自不懸鉢樹立法門正在淡薄時操履律師行律豈見利而違聖制耶古潭愧顏作禮而退至三日後聞復領徒上山齊跪方丈門外涕泣謂在楚朦朧如此實非自大慢僧懇和尚慈悲容懺悔所有言教盡行遵依諸首領為其拜求由是令在鹿山莊結界安居遣闍黎等半月往彼教誡為講本部毗尼見公因撰教誡比丘尼正範一卷九八清泰州青蓮庵尼德日傳附德月傳德日姓蔣名葵字冰心泰州人生而聰慧甫識字即能辨大意為詩無師承輒工後為尼住青蓮庵著鏡奩十咏集與周羽步吳蕊仙齊名其妹蔣蕙字玉潔亦祝髮庵中名德月故德日詩有夢醒聞雁卻憶女弟云依稀蓮步夢中來忽聽孤鴻意自哀爾為失群豫憶妹煩君寄淚到粧臺此猶為未遂志以前所作德月亦能詩其閨怨云十丈深情四繞溪風光二月六橋西八千路遠三秋別百萬愁驚一夜雞白璧五雙盟尚有青絲七尺結難齊半生兩處成孤夢九折柔腸烏夜啼孔東塘國博有初春偶過青蓮庵題壁詩起句云詩才冰玉兩嬋娟海上相逢入道年又有弟悟兄參之句蓋為二蔣作也九九清南海檀度庵尼自悟傳自悟遼東人父尚可喜屢建軍功鎮廣州封平南王王有子二十三人女十七人師最幼生即茹素禮佛不諳家人操作覩諸兄弟之橫恣憂患成疾力懇為尼王不能奪於康熙四年選宮婢十人為侍者卜地南海越井岡之陽建檀度庵居之群稱為王姑姑悟博通梵典戒律精嚴先平南王示寂不覩家難樊昆吾南海百詠續編道其事云一串牟尼脫火坑傭中佼佼鐵錚錚蒲團不墮紅羊劫笑彼飄零孔四貞一清南海檀度庵尼無我傳無我平南王尚可喜宮人隨王女自悟出家於南海為檀度庵尼能詩善畫人物尤工庵有自悟像披髮衣紫蛾眉雙蹙若重有憂者相傳即無我手筆又嘗寫通體小影支頤枕石而臥蕉陰苔色上下掩映題句云六根淨盡絶塵埃嚼蠟能尋甘味回莫笑緑天陳色相誰人不是赤身來寄託遙深見地高妙蓋取維摩經是身如芭蕉中無有堅之意而為之也字體亦娟秀熟練得蘭亭遺意我焚香禮課梵韻悠揚勤翻貝葉少拈筆竿故其寫作極為世重云一一清興化普渡庵尼醒徹傳醒徹字季總湖廣衡州劉氏女父夢老僧索住處許之母懷娠十有二月既而胎鳴者三生時有白光燭室衆皆謂奇幼不茹葷稍長好閲儒書佛經痛念生死厭處塵凡一日讀緑蘿山茨通際禪師所集南嶽禪燈録即往見求開示際痛切究竟頓發疑情苦參四十九晝夜不倦忽然杲去三四時不見有身心器界偶聞雷迅如在羅網中跳出相似銀山鐵壁一時粉碎即上南嶽求證并懇剃染受具杜絶俗眷住靜別峰際示寂後廬墓三周即拽杖南遊遍歷祖剎於鎮江鶴林參牧雲通門竹林參箬庵通問繼又謁宜興龍池萬如通微機契即記莂焉出住興化普渡蘇州慧燈檇李福國當湖善護等處機語捷給儼然匠首所至士女繞座爭求垂示其筆札之清新詩歌之峻拔一時膾炙人口晚回南嶽住淨瓶岩終有季總徹禪師語録二卷入嘉興藏一二清吳縣西洞庭山尼德隱傳德隱吳縣人姓趙名昭字子惠隱士宦光女祖母陸卿子母父端容俱擅詞翰之學德隱能嗣其美寫生工秀兼長蘭竹適平湖文學馬仲子班性好煙霞常葛衫椎髻自擬道民父母歿隱歸葬之乞名人志其墓人謂無子而有子者德隱也會馬氏丁難破家遂更名入空門結庵西洞庭山香林匿影二十餘年為吳中奇女子清磬之餘不廢吟咏有詩云虞山錢太史柳君春日采蘭忽得雙了復以並蒂植之庭中命余圖焉時席試湯餅會諸名閨共賦采蘭詞余亦成詠日照鮮膚露未乾輕羅徐酌喚人看若因野客良緣好兩席花前看浴蘭又新秋晚眺云山中多晚涼清風厲秋節遙瞻四五峰壁立皆奇絶修竹傍林開喬松倚巖列黃菊散芳叢清泉凝白雪對此懷素心千里共明月願保幽貞姿歲寒雙皎潔著有侶雲居遺稿一三清常熟直指庵尼行玄傳行玄字圓鑑常熟曹氏女幼出家詣報國受具嚴持律範初參金粟悟禮拜次即竪拳悟便棒曰者箇是甚麼玄