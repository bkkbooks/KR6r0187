body:
  text: 續比丘尼傳守培序世間聖人立於像形上觀察一切故曰乾道成男坤道成女男尊而女卑夫唱而婦隨是以中國女子終生無主權以三從而為德所謂未嫁從父已嫁從夫夫歿而從子出世聖人立於體性上觀察一切故曰大地眾生皆具如來智慧德相唯因妄想執著而不能證得世人始唱男女平權原來吾佛唱之早矣非特男女平權而一切眾生迷皆平權又不但眾生偕眾生平權而眾生與諸佛亦平權凡女子學佛出家者即打破世間假像的階級實行出世體性之平權三從頓舍終生自主以有體性之觀察力故能轉變性質如化魚而成龍傳中諸尼僧是也亦有不脫像形之習氣者則觸途成滯如暴腮於龍門傳外諸尼僧是也世人已知提倡男女平權而未知提倡一切眾生悉皆平權若進而提倡一切眾生本皆平權不存大小強弱之觀念則世界可期平矣但吾佛從平處唱平世人從不平處唱平平同而平處特異世法與佛法不同此也近有女子頭角崢嶸露於社會之上與男子平權矣慨吾佛教之比丘尼反寂然無聲如寒岩枯木毫無生氣徒負出世丈夫之虛名不若在家女子之有志氣悲乎末法尼眾身雖出家心不知道而亦不求其知以為出家止於薙發染衣而已此等尼眾如彼盲人誤入歧途若無援引奚歸正路維我震華大德年未自立識已過人植慧根於夙世發智花於今時淵學遠鑒歎佛法之蕭條觀古傷今悲尼眾之不振是以採訪過去有道之高尼乃為今後釋子之龜鑒上從蕭梁下至民國聚英集華名曰續比丘尼傳冀此傳傳播四方憲章有道不使過去克己成仁茹苦會辛之輩與草木同腐湮沒而無聞亦可令吾現前釋子觀彼比丘尼我亦比丘尼彼即如斯我亦應如斯彼比丘尼當能如斯而我比丘尼不能不如斯此雖文字之般若實為振興佛教援引迷途之梯航也書成問序於余余略述著者之志願以告讀茲傳者是為序民國二十五年丙子夏六月中澣至山退隱守培序於妙心精舍續比丘尼傳自序原夫法性平等本無男女差別良以一切眾生從無始來昧失本因起惑造業循名著相橫生計執遂致形成依正假名不出根塵妄習非唯著我躭人益復重男輕女抑之不足至謂無才是德卑之不足至謂慰情勝無積習相傳古今共轍暨乎斬絕情塵歸心釋氏喻如四河入海同一鹹味既無高下之分何有軒輊之見法華會上龍女居然成佛維摩室中天女竟爾易形猗歟休哉佛法博大精深圓融極致觀於是不尤信乎雖然深引出離經論不無呵色之說捐除染著菩薩常作避坑之觀所以然者實緣於諸衰中女衰最重是眾苦本是繫縛本具三隔五礙修行障重比二乘根缺淨土緣疏是以姨母出家猶嚴乎八敬尼眾戒條遞增乎五百此非固為已甚要亦意有所在也職是之故愛道雖有傳人難登竹帛高僧獨多長史盡著簡篇幸賴寶唱一呼僅存六十五傳何竟步塵無繼寥落千百餘年夏樹芳為眾名公立言彭尺木為善女人著錄彼皆各擅其美光曜不磨此何獨付缺如機緣有待華才實愧於贊寧志竊希於司馬感潛德之不彰悲斯文之若喪於是振襟而起寧計學殖之疏奮筆直書渾忘言詞之拙歷時幾及三年集稿垂成數帙不意所託非人頓遭遺忘之慘前功盡棄徒勞剔抉之勤兵火無情善緣多阻思之誠痛惜也劫後殘軀捷在幸為漏網之魚故業重尋自是識途之馬祇以圖書盡行燬失參考無從堪記憶能有幾何編修匪易惟憑鄴架借觀登門如同受教郵筒問訊折簡不知謂何所幸先難後獲尚不唐捐有志竟成信乎不謬爰賦一律紀其事曰閱歲幾千載高尼豈乏人言行能軌物簡冊獨遺珍感此耕余目摛詞著彼仁寧惟箴史闕寶唱原傳有望箴闕之語亦可範同倫民國二十八年四月夾山震華撰於碧巖丈室
