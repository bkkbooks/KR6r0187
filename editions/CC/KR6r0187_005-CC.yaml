body:
  text: 民國京口夾山沙門震華編述一三二清仁和萬善庵尼傳正傳傳正仁和繆氏女為文學倪昭素副室昭素連喪子女及娶繆得子超鐙絕嬖愛之而傳正力辭出世遂捨身東里坊萬善庵日夜坐蒲團八年如一日嫡王氏化其真誠撫其子若己出昭素歿嫡與其子無所依傳正迎養送其子於藥師庵又能開示善類如文學沈希珍妻王氏觀察沈循妻陸氏皆師事之康熙甲寅年五十四留辭世偈云五十餘年似夢中今朝四大各西東了明性海無生法更有何言說苦空語畢端坐而逝超鐙能述其志一三三清嘉善某庵尼德容傳附智圓傳德容俗姓朱名又貞嘉善人性極孝訾笑不苟年十六適張我璞閨中賡唱聞者豔之後我璞為科場所累全家發遣乃上疏捐軀贖罪後為尼於某庵味道苦節名稱遠聞其所為詩不類凡響茲為錄秋色有感二首征帆溼淚帶秋風客路迢遙欲轉蓬無限憶君傳織錦有情長寄白雲空昨采將離不覺愁鐘催殘月獨悲秋思君旅館應無語南望多情似水流又有尼智圓字湛遠姓殷常熟人亦能詩其弔彭娥娥南通州人夫貧甚令彭鬻乳以活彭不從自經死云匹婦得成名寒門志獨誠乳雛憐燕羽逐婦惡鳩聲智以窮愁短身因激烈輕寸膚如可鬻涇渭不分明一三四清仁和薛支庵尼石巖傳石巖仁和蔣氏女名舜英幼讀書警悟凡技藝一一涉獵而於琴尤得絕調書法董文勉尤精於斯邈篆隸亦時作蘭竹小畫文則工六朝儷體詩絕似義山飛卿初為巨室侍姬後祝髮於薛支庵誦經念佛精進無減久之慧悟𤃒發善說法要能令聞者心開意解或懸示經旨或隨口開示無不深中肯綮一時皆尊為善知識一三五清姚江伏龍庵尼印月傳印月姚江黃太史冲姪女自幼不染世緣生死心切常喜靜坐讀雲棲法彙宛如宿契遂動出塵之想十六適東山謝氏三載便改道粧進戒杭之理安後參天童通奇得悟玄理慕高峰遠祖遺風結茅山頂自稱伏龍庵主一三六清某縣普應庵尼希古傳希古字蘊宗祝峰善嗣住某縣普應庵上堂天空海闊月白風清在處漁樵起舞隨方物類生歡新普應怎敢違時失候千差萬別向者裏一齊坐斷逈絕誵訛踏開生佛頂𩕳揭露須彌腦蓋大眾且道神通耶法爾耶恁麼會得盡十方世界總不出我者裏若是門庭施設也要另出隻手以拂子畫相曰心燈焰焰傳芳遠一點無私徹古今又小參洪鐘在架有扣則鳴寶鏡當臺有來則現諸大德各各本有一段光明用無窮取無竭灼然一切處不昧著明鏡洪鐘無二無別自是汝不薦蓋為妄執塵勞分別影事汩沒生死浮沉苦海被根境縛著累劫難脫諸人要念直下便念有什麼相隔處如不爾者三根椽下七尺單前把身心打疊得乾乾淨淨仔細諦審看是什麼物者裏翻得身轉一點也朦你不得方知吾不汝欺還有麼良久曰把手勸君行不得為人自肯乃方親一三七清華亭某庵尼神一傳附靜維傳神一字荊隱號淑吉華亭人夏考功女于歸未久有悼亡之痛其詩云蕭蕭鑒元夜幽室生微涼眷言念君子沉痛迫中腸音徽日以杳翰墨猶芬芳靈帷空蕭條齋奠直荒唐放聲百憂集泣涕不成章遂從師學法游心至道靜維亦華亭人姓盛諸生慶遠女為神一中表妹許字侯峒曾第三子瀞未嫁瀞亡命以死著懷湘賦以見志來歸上谷旋斷髮禮神一受具師資並以詩名如秋宵對月云夜靜天地涼凭樓獨凝眺煙樹色離離雲山望中杳萬籟寂無聲數螢流木杪青燈照羅幙殘葉鋪池沼悲者今古情乾坤徒浩渺憂懷自蒼茫至意漠難曉嫦娥知我愁流影來相照當時金石心千秋同皎皎又題春草堂云十載重遊地孤城帶落暉西園迷舊迹北渚長新磯玉樹人俱盡金庭事已非何須聞短笛獨立自沾衣一三八清長洲某庵尼上鑒傳附再生傳上鑒字輝宗俗姓吳名琪字蕋仙號佛眉長洲人孝廉康侯女管勳室善畫工詩能文章與松陵周飛卿瓊著有比玉新聲集瓊贈詩云嶺上白雲朝入畫尊前紅燭夜談兵蓋實錄也後夫死於官家了不可問因祝髮清修遂不復問人間事云句如飄殘絮影遙知柳啼遍桃花不見鶯愁來有句留殘葉夢去無人問落花皆大曆佳句宜為名媛詩話所賞所著詞名曰瑣香尤侗鷓鴣天題女史吳蕋仙畫云拂水佳人墮馬妝春來響屧滿橫廊繡繻甲帳無消息暮雨瀟瀟空斷腸筆翡翠硯鴛鴦吳綾三尺寫紅窗青山碧水無人處亂點桃花賺阮郎再生亦長洲人姚姓名媯俞字靈修文毅公女孫亦工詩其不寐云殘燈一點爇孤擎門外蕭蕭落木聲風動庭梅疏影亂露凝修竹暮寒輕支離瘦骨惟供病牢落愁懷豈為情此夜酒醒魂斷處半簾明月夢無成後出家為尼著有再生遺稿一三九清通州鴻寶堂尼無垢傳無垢通州人姓陳名潔號石香監生孫安石室安石家饒裕不善持籌遂中落以潔無子不相得挈妾婢異居潔乃歸母家久之落髮即其祖舊業所謂鴻寶堂者以事焚修然不廢吟咏晚年益貧病數月不起起覆水窗前墜樓而死著繡佛齋集茹蕙集集中有書懷云青翠入簾櫳永日駐幽閣愁縈芳草生靜覺桐花落奩鏡網蠨蛸庭柯巢鳥鵲夢去不關愁曉來心自惡獨坐只書空微雨益蕭索又秋鴈云弱不禁風素自憐黃昏細雨斷疏煙樓頭指冷誰吹笛塞上身單欲寄綿一任啼烏翻子夜直須飛雪送窮年攀枝信墮英雄淚殘照蕭條灞水邊一四清杭州明因寺尼元端傳元端字御符嘉定盧氏女年十二祝髮長洲堯峰後參天童山曉禪師得法開堂於杭州明因嘉興伏獅兩寺禪餘吟詩多佳作書齋偶吟云榻寄閒窗下相攜話昔遊烹茶成雅集開卷足清幽宿雨花生潤微風鳥自謳留將殘照影靜拂素絲幽一四一清蘇州葑溪般若庵尼妙惠傳妙惠長州人姓范山西李峙岩室早寡父母勸其改嫁堅志不渝作柏舟操以自矢父母歿遂祝髮於葑溪之般若庵從者甚多其詩才甚工有般若招提小坐云夜雨洗山巖朝來翠獨濕趺坐學觀空清風滿香積正因字本無而我好翰墨心即等死灰未了人間孽窗竹皆虛心庭松多勁節體此長青樹原不在虛實何況鐘魚間梵理更無得坐久聞妙香慈航如可接卒年八十餘著曇花軒集一四二清金陵舊院尼妙慧傳附曙光傳妙慧俗姓馬名如玉字楚興本姓張從假母家金陵南市樓徙居舊院熟精文選唐詩善小楷八分及繪事獨薄紈綺好品題花月指點溪山飲雨臺賦落葉云登眺臺千尺論心酒一尊清霜侵樹杪紅葉媚江村逐浪同浮絮隨風欲斷魂榮枯何足歎此日幸歸根又燭花云銀燭透銀簾蘭房瑞色融白葩應妬月紫燼卻愁風杯映珠還浦光流星度空無香辜蝶戀有焰引飛蟲後為比丘尼受戒於棲霞蒼霞法師耑勤學佛徧遊太和九華天竺諸山思結茅莫愁湖上焚修度世未果而卒年三十三曙光姓胡名朝霞上元人能詩送人云秋風江上送君舟落葉江楓總別愁解纜不知人去遠凭欄猶倚夕陽樓後出家為尼住持某庵著有紅于詞一四三清蘇州水月庵尼安生傳附元瑛傳安生吳縣人妙齡穎悟善鼓琴能詩出家洞庭水月庵年二十二而夭其詩傳者甚少有朱夫人惠碧螺春一首云綠潤涵靈氣清芳帶露華翠微新雨歇雲竇古根斜沸鼎看魚眼擎杯吸乳花多君緘贈我應自勝流霞元瑛字赤浦姓賀丹陽人蘗齋孫女出家某庵工詩有留別士雲小范兩弟云我已生涯一笑空家駒還仗振遺風幾年別夢三秋破千里煙波一棹通盛世金門多早歲浙西老衲本江東歸來便欲乘潮去搔首輕雲逐斷鴻又深秋返里六叔父園亭對菊云此身自笑類寒蟬衰病歸來亦偶然一路詩篇殘夜月到門樹色淡秋煙漫將離別從頭數且喜名花入座妍茗椀爐香等閒事追隨卻值淺涼天一四四清蘇州洞庭東山尼宛仙傳附僧鑒傳宛仙長洲人石如玉女許字某氏子貧而喪檢因祝髮為尼住洞庭東山詩才清妙葊中寫懷云禪關晝掩絕塵踪前有修篁後有松野鶴去時人少伴曉雲起處筆添峰當時自識塵緣淺今日誰知道味濃千里赤繩從此斷超然何用講三從時寒山庵尼僧鑒吳縣人絲竹俱精談諧入妙亦擅絮才咏秋海棠云紅甲垂垂白露姿薜蘿墻下最相宜不教鸚鵡呼肥婢肯與蓮花作侍兒幾處閉門秋雨後何人立月晚香時愁腸欲斷非關汝續命無煩葉底絲一四五清吳江紫雲觀尼妙霓傳附靜婉性道傳妙霓字靜韻姓江吳江人住惠泉山紫雲觀善寫蘭兼工吟咏春夜云新篁風韻夜窗幽好夢驚回惹舊愁一瞬春光忽歸去子規啼月下西樓又靜婉金壇吳氏女於蘇州木瀆為尼忘其名亦善於詩別思云西淹雨未收東淹風又作留住綠簑衣莫與篙師著又性道姓周名瓊字羽步一字飛卿吳江人少有才女俠士之目後出家詩名甚著雖欲掩而不可得如春居云小榻參差竹影斜衡門芳草鎖煙霞稜錚傲骨詩為友淡泊禪心畫作家暖日不須來燕子春風爭肯逐桃花凭闌細雨瀟瀟夜慷慨悲歌撫鏌鋣一四六清滄州插花廟尼董尼傳董尼忘其名住滄州插花廟遇大士誕辰潔治供具甫畢忽覺神倦隱几假寐夢大士詔曰汝不獻供我亦未嘗饑汝即獻供我亦不加飽寺門外現有流民四五輩乞食不得困餓將殆汝輟供具以飯之所得功德勝供我十倍也霍然驚醒啟門出視果然自是每年撤供具皆以施丐者曰此菩薩意也一四七清無錫福慧庵尼嶽蓮傳嶽蓮一作淨蓮俗姓王號韻香又號清微道人無錫人所居庵曰福慧雙修書學靈飛經秀骨天成尤工畫蘭竹多小幅娟靜疏朗別具風格其自題畫蘭有塵外天然見標格肯隨桃李嫁東風之句四方名流咸以一見為幸後為輕薄弟子所侮雉經死聞者傷之一四八清鎮江某庵尼舒霞傳附悟清傳舒霞京口人生乾嘉時所住庵不明能詩有甘露寺一首云鐵塔凌波起南山隔岸浮空香花乍雨林逈竹先秋室似鮫為室樓疑蜃結樓祕藏多梵筴龍樹此曾遊與王碧雲女士善往來倡和碧雲贈云仙子傳來古雪篇步虛聲裏絳雲仙遙知靜對梅花月鶴聽禪經立晚煙時又有悟清者揚州翁氏女其姊雲卿為和希齋大司空側室和歿後雲卿殉節時悟清年十五六同在京師親見其事忽悟曰人生富貴功名一死便了又何必作葵藿之傾心揚花之飄蕩耶乃慨然出京相依京口駱佩香夫人以守節自誓清狀如男子意氣豪放善吹簫能填詞尤嫻騎射上馬如飛一時名公卿皆敬其為人有奇女子之目後出家為尼趙甌北先生有詩贈之一四九清燕都靈官庵尼明本傳明本字東悟姓陳氏吳人也父曰久康母虞山高氏嘗禱於神乞子而生二女神示兆曰此子足傳宗矣本生而聰穎幼好讀書性至孝母篤信佛故本矢志不字託迹空門挈養蒸蒸久而彌敬得法於維摩山為費隱禪師四世法裔嘗禮峨眉游普陀歷九華朝五臺四至京師所止之處如牟尼圓照令人欽慕于石林闢智林法苑立淨業於塵埃之表復卓錫燕都齊化鄂外靈官庵蒲團靜攝間為吟詠以寫性真或繪佛像山水花卉藉資禪悅而瀟灑活潑之致時流露於楮墨著有語錄南帙九卷及鑒雲留跡諸集都十餘卷其自題荊州寓庵求畫西湖云移將江浙置荊州咫尺西湖任所遊神入妙時天地闊意融通處水山優雲煙每斂開林道霞彩頻興擁殿樓一帶芳隄春正好三潭印月又堪秋又題智林莊嚴閣圖云融融麗日洞天幽一種清華近寶樓香篆去從朝彩接白雲來自曉風收泉流竹葉將成筏霞復桐枝欲化虯瑞氣滿峰花滿麓直教斗室作神州乾隆庚午輔國公如嵩庵為作鑒雲錄銘一五清滄州憩水井尼慧堅傳慧堅住滄州憩水井戒律謹嚴併糖不食曰糖亦猪脂所點成也不衣裘曰寢皮與食肉同也不衣綢絹曰一尺之帛千蠶之命也供佛麵筋必自製曰市中皆以足踏也焚香必敲石取火曰竈火不潔也清齋一食取足自給不營營募化不許婦女至其寺而肯至人家雖小家以粗糲為供亦欣然往不勸婦女布施惟勸之存善心作善事說法直截了當令人聞之意消有一宦家婦不見容於夫鬱鬱將成心疾性情乖剌琴瑟愈不調一日詣寺叩問因果堅曰吾非冥吏不能稽配偶之籍也亦非佛菩薩不能照見三生也然因緣之理則吾知之矣夫因緣無無故而合者也大抵以恩合者必相歡以怨結者必相忤又有非恩非怨亦恩亦怨者必負欠使相取相償也如是而已爾之夫婦其以怨結者乎天所定也非人也雖然天定勝人人定亦勝天故釋迦立法許人懺悔但消爾勝心戢爾傲氣逆來順受以情感而不以理爭修爾內職事翁姑以孝處娣姒以和待妾媵以恩盡其在我而不問其在人庶幾可以挽回乎徒問往因無益也婦用其言果相睦如初又嘗出入紀文達公曉嵐之外祖張雪峰家偶一僕婦以一布為施堅熟視識之曰布施須用己財方為功德宅中為失此布笞小婢數人佛豈受如此物耶婦以情告曰初謂布有數十疋未必一一細檢做偶取其一不料累人受捶楚日相詛咒心實不安故布施求懺悔耳堅擲還之曰然則何不密送原處人亦得白汝亦自安耶後婦死數年其弟子乃洩其事故人得知之乾隆甲戌乙亥間年已七八十矣忽過紀曉嵐家云將詣燕京潭柘寺禮佛為小尼受戒曉嵐偶話前事搖首曰實無此事小妖尼饒舌耳曉嵐嘆其忠厚臨行索曉嵐題佛殿一額曉嵐囑趙春磵代書合掌曰誰書即乞題誰名佛前勿作誑語為易趙名乃持去不知所終一五一清昆明清淨寺尼妙德傳妙德呈貢人姓趙氏乃蒼雪法師之胞姊也童年祝髮於昆明城南清淨寺履止敦樸惟戒確守衣鉢之餘分寸不蓄篤志精修一無虛日常領眾數十時謂滇南尼眾之善知識也每為大族所重壽七十餘終於本寺德清初人因發現較遲補插於此一五二清杭州湖上老尼傳湖上老尼不詳其人念佛誦經極虔謹精嚴戒律有道人每歲一來來則劇談彌日然後去一日尼預與道人約待之不至自言將逝不得與此友別奈何復待數日又不至乃命人舁龕斷橋上手執線香一枝從容入龕頃之火發遂自焚觀者如堵至身已焦黑念佛聲猶不絕云一五三清蘇州圓通庵尼本印傳本印字松岐吳縣人幼多病因發願出家年二十五父母送之城中圓通庵薙染尋受具戒別買屋數間以居名曰觀幻戒行潔清勤修福業歷諸名剎供佛飯僧回向淨土乾隆四十五年八月自九華歸結期禮大悲懺甫經二七忽感微疾曰吾生緣其盡乎遂輟懺專持佛名至十月初旬臥牀七日右脇西向念佛無間已而囑付後事畢命其徒誦阿彌陀經至三周寂然而逝一五四清蘇州白衣庵尼遂欽傳遂欽字越成無錫人九歲出家稍長遇一尼師激發專持佛名行住無間尋住蘇州南園白衣庵興復殿堂念佛益切年五十始受具戒至五十五其年三月雞初鳴召其徒曰吾將去矣徒曰師無他恙何出此言因泣下欽曰癡人哭我何益認真念佛可爾遂趺坐西向同稱佛名盡炷香乃逝事在乾隆五十三年一五五清蘇州圓通庵尼律宗傳律宗字聖可嘉定人三歲失母其祖母攜至蘇城圓通庵尋薙染受具戒少好禮佛長誦法華經苦不能解義因詣金山及杭州崇福參究累冬歸而專修淨業屢詣諸名山供佛飯僧年五十三得咳疾遂閉關不出以西方為期至年六十四正月朔集諸緇白同稱佛名至日昃顧諸左右勸勉修行語劇苦切尋舉手稱西方極樂世界大慈大悲阿彌陀佛如是者三趺坐而逝蓮華香滿室中事在乾隆五十五年一五六清蘇州崇佛庵尼佛琦傳附祖潔傳佛琦字見琳長洲人自少不願有家既長其母送閭門外雨華庵薙染尋受具戒已而受城中崇佛庵尼道堅囑付繼為庵主募金千餘兩造西方三聖旃檀像高八尺歲結七日期場集淨行僧為念佛會歷諸名山供佛飯僧為常州天寧寺置田三十畝晚而專修淨業將逝前三日見菩薩現身兩童子侍或言聞菊花香琦曰此青蓮華香也乾隆五十六年八月晦有近事女問疾琦令扶起集眾焚香稱佛可二千聲遂逝其徒祖潔字蓮芳祖松字柏庭祖淨字慧通祖徹字智達俱能不替其業祖潔參天寧淨德禪師淨德示偈曰塵凡超出豈尋常一朵優曇鉢裏香華藏海中何異此普天匝天盡芬芳後目擊其師琦公往生事迹遂亦深信發願念佛無間年三十餘得疾念力益堅臨終亦正念分明面西趺坐合掌而逝事在嘉慶十三年一五七清金陵慈恩庵尼慧照傳慧照壽春陳氏女梁學文室奉翁姑甚孝初姑有病慧照焚香誓神割股和藥煎湯以進姑病遂愈尋孀居日工紡織其長子有宿根求出家許之依師勝音祝髮名悟成字方聚後成大善知識住金陵封崇乃迎慧照至慈恩庵奉養無缺既得浩清律師開示隨生歡喜發心出家稟受大戒晝夜念佛無得間斷至睡夢中猶出聲念佛庵眾皆歎服敬之如神時方聚遷主揚州高旻慧照獨居慈恩甚安倏越五載方遙依封崇安居七日作法前兩日在封崇作法晏然無恙忽然第三日西向念佛坐逝世壽六十有九乃嘉慶十三年也方聚遵遺命荼毗送靈骨歸江留衣鉢分建二塔一建於金陵鳳臺門外皇姑庵後山一建於維揚朴蜀鎮南一五八清嘉善淨池庵尼朗然傳朗然姓沈嘉善人年十八見嫂氏產難之苦自誓不字求父母出家於邑之陶莊淨池庵專志淨土行持既久閒忙無間嘉慶十三年謂其徒福緣曰吾三月中已三夢寶池跏趺華中往生有分矣汝當篤志念佛自然水到渠成功不唐捐慎毋錯過至三月念五日無疾坐脫年七十一一五九清湖州廣嚴庵尼妙成傳妙成湖州菰城何氏女生有慧性髫年即容止端莊不同常兒母故奉佛每見母舉佛號便合掌相和年二十一適同里王生未半載夫亡翁亦信心念佛顧家貧成勤紡績以供菽水朝暮則誦華嚴持佛號為常課如是十餘年後翁出家為僧姑繼亡成亦投本城北門外廣嚴庵為尼旋受具戒持守嚴恪益專志誦經念佛甘棲淡泊絕意攀援嘉慶十九年示微疾語侍者曰吾生緣已盡後三日當西去若輩幸自努力修持或有見期勿忘吾言至第三日正趺坐誦佛忽舉首曰接引佛已到吾行矣即瞑目而化年四十七一六清蘇州慈雲庵尼清月傳清月無錫人居吳門慈雲庵日誦彌陀經百遍往生咒三百遍為常課雖寒暑不怠嘉慶丙子春恭詣育王禮塔朝覲舍利跪而觀之仰見鐘內涌出一珠色若青金寶石瑩淨明亮或謂白色最勝復稽首懇切求示瑞相越七晝夜至第七日侵晨焚香頂禮胡跪合掌一心諦觀但見鐘內青光寶珠如前而大其青珠上復綴一白珠色若硨磲大如荳自謂青色青光白色白光經中佛說如是決定無疑矣又往天台山齋五百羅漢自華頂拜經臺至上方廣曇華亭隨路進香途中默誦阿彌陀經如是我聞至皆是大阿羅漢眾所知識忽於山嶴中突出五六僧衣服雜色如常人逆走而來將近前月鞠躬合掌敬禮舉首欲有所問視之已失所在佇立四顧瞻望乃見六僧在於高峰崖畔騰空入雲林深處於時同行香客十數人皆無所見惟清月一人目睹聖眾由其一念精誠之所感也一六一清秀州草庵尼道乾傳道乾字世禪嘉禾雙溪陳氏女年十七出家於秀州之蘿庵喜清淨自居看古德機緣遂發明向上志圓具後詣天台國清寺參寶林珍公見時便問如何是大人相珍曰待汝除卻五障來即向汝道乾曰與麼則瞞和尚去也珍曰汝那裏學得這虛頭來乾不覺汗流浹背便禮拜珍復問曰如何是大人相乾展兩手示之珍公印可旋授衣拂乾既得旨罷參住南湖之草庵庵破敗不堪處之宴如也操履真實順逆一如平居一字一禮三轉華嚴課大般若經數十部由是道風遠著施者雲集次第建諸殿堂其庵居偈曰學道殷勤年復年從今不著有無邊歸家莫便家中坐好為人耕劫外田又於庵中設念佛堂晝夜魚聲不絕者垂四十年嘉慶二十五年冬示微疾十一月十一日謂其徒曰吾明日寅時當去矣至時說偈曰八十八年無貪無戀歸去來兮水清月現命眾同聲念佛吉祥而逝一六二清寧國蘭若庵尼傳蘭若庵尼失其名姓陳寧國郡西世家女西禪寺僧某未出家時聘為室後某棄家為僧尼亦出家於三乘庵旋移居蘭若日則隨眾苦作夜則獨坐念佛性甘淡泊其兄時遺衣食卒乃卻之曰我既出家若常與在家昆季往還仍如未出家矣後念佛坐化時當酷暑七日肉身不腐一六三清華亭吉祥庵尼道悟傳附文信見心禪學傳道悟字慧心姓汪松江華亭人早喪父寡兄弟與祖母母氏同居家甚貧守貞不字已而投吉祥庵出家旋詣地藏院受具戒念佛精進道光十三年六月母氏念佛而逝七月祖母亦逝悟於八月五日請戒師道生和尚告曰大事了畢吾欲西歸懇置龕一具明日邀眾念佛一天以為助緣是晚香湯澡浴及旦集眾念佛一永日至夜告曰佛來接引矣跏趺而逝文信字芳本姓劉道光間住南海檀度庵梵行清嚴工山水學石濤極蒼莽之至見心毗陵人居趙庵善畫梅人亦閒雅禪學毗陵人亦居趙庵性聰慧善畫竹喜吟咏一六四清泰州姜堰觀音庵尼悟真傳附修淨傳悟真泰州姜堰邵家巷人歸陳氏幼年早寡族業蕭條親舊亦復乏人煢煢孑立身世悽然因而發憤曰家務煩重必受牢籠之困子孫眾多徒增牛馬之勞余今孤苦零丁形單影隻若以世情論之未免堪哀若以佛法論之正是大幸聞之古人尚有割愛辭親到處訪道尋師以冀了脫生死大事者余則無愛可割無親可辭不離本位即是道場又何苦效彼愚婦之行終日作無益之悲感而自戕其軀哉乃改家宅為庵號曰觀音投師披剃現愛道相從此晨鐘夕梵精修苦行杜門卻掃無罣無礙久之道聲傳播感發人心有袁氏女向慕其志為之歸依命名修淨此後法門得伴辦道愈勤雖糲食粗衣而自饒餘樂積數十年熏修檀信所貽甚厚但終不肯積蓄以長戒垢盡傾其篋為常住裝修殿宇購置田產使萬年香火有所攸賴晚年續得廣如文元諸孫曾輩相繼來依皆能恪守清規恢煌廟貌州主李國瑞曾為垂示勒石以資保護更獎以匾額用為尼眾之勸云真示寂年月不詳一六五清泰州泰山行宮尼福海傳附慧傳傳福海字恆修泰州姜堰張氏女宿植德本早脫塵凡善於化導閨閫靡然從風足跡不止一境所過皆成寶坊前後凡興復十五伽藍住州城泰山行宮尤久初行宮管理無人荒廢不堪及海受請司職改造殿宇添建群房拂去几案之塵重續長明之焰宮中原有之田僅伍拾畝零伍分至此陸續感得善信朱成志朱永年各施草荒田陸拾畝朱藎臣施田玖畝朱曹氏施田拾玖畝並於宮內開井一口以利汲引又置法器什物多件凡利眾助道之具可謂無所不備晚以其家付徒慧傳接住自則恬退靜修歸心安養州守李國瑞高其風範題悟徹修清四字旌之道光十五年三月十三日子時示寂世壽六十六歲歸依弟子多眾悲夫津梁頓失楷範猶存思欲矜式將來轉移後世特命匠肖其像於祖堂一六六清蘇州某庵尼量海傳量海名如德以字行蘇州人住持某庵多親知識博通教乘融合禪淨接引方來嘗於寧波育王塔前燃指供佛發願弘深見當時尼界不振特致感慨揮筆為警眾語一篇披肝瀝膽勉勵有加其文曰華嚴以人中師子比佛五十三善知識獨一比丘尼以師子為號可知威神卓越成就佛心不以比丘尼而遂弱也我等墮在僧數毀形割愛違親去里為何事乎實因生死事大無常迅速一句了然斷盡輪迴惡境而已若為名利榮耀稱心快樂非出家之本志矣今之出家人一經剃落便自高狂不了自心受人禮敬如斯行止難報四恩徒入空門將何憑恃況乃人身難得佛法難聞已得已聞又復錯過袈裟下不明此事苦無極矣且今日大比丘僧還有諸方叢林禪堂規策堂頭長老開示熏聞雖自迷昧漸得明通我輩比丘尼眾都無此也終日喧喧逐色隨聲向外馳求未嘗返省為師不教為徒不學光陰可惜剎那一生荏苒人間而無所益夫女人出家當棄女人之習發勝妙之種尊重高僧猛入佛法心懺悔念清涼深發大悲心全行解脫事方得十方矜式四眾環興伏望諸賢及早立志己事未明他事莫理專心一處不了不休然此一事人人本具各各現成所以心源未暢逐境飄馳實因終日在妄想影子裏作活計不得真實受用也無論念佛參禪總要將我等歷劫以來愛習愛種次第拔出一時破盡方有下手處終日一行習氣若發自家斷之還歸一行一行功深於靜細中照見種子還以一行除之一行有力愛種自枯即永絕眾生心累也然一行不論禪淨總是孤炯炯地十二時中更無一事十二時中常若有事方是修也斷不可一念涉入名聞利養也所謂神尼不待現通說法但禪淨二宗或單修一行或並作一行各人手眼隨力修之親近善知識思惟了義教於一切法心心平等如是用功者得力而省力即神尼也何以故直截下手未曾自欺也師子搏虎用全力師子搏兔用全力有人問用何等力古人云不欺之力果能不欺則十二時中本光常住勤修一行頓顯本來矣靈山會上六十比丘尼未受成佛之記龍女一出大眾皆興故六十比丘尼近作法師遠階佛位然在師子一頻申則已五十三位具足尼不自弱則法界本無遠近也何不痛念出家時一場甘苦猛就大法學師子頻申脫盡諸女人境界乎清規束身神明自遠勿甘碌碌是我真眷屬矣咸豐間粵賊飆起量海避兵有惡疾人曰既是大修行人何故有此惡疾答曰此一一波羅蜜非汝所知也臨終時徹夜呼近事女姚古明之名既卒人以告古明古明曰此時真喫緊念佛未遑豈遑念余哉足徵其閒暇優逸也所著影響集一卷入續藏一六七清寧波青蓮庵尼明恆傳明恆先為優婆夷住寧波鄉之青蓮庵專修淨土因病遂薙髮念淨土堂未曾完工病中每抱遺憾有妙理法師者示之曰世事未了有人替汝生死事未了無人替汝今宜放下一心歸命矣又有式教大師者亦時來警策遂默受善誡妄想芟除一日晨朝忽謂大眾曰今日巳時可行或問曰巳時向那里行曰汝豈不知西行至巳刻果安然坐化一六八清黃安綠波庵尼人稀傳人稀黃安人通文墨書翰年二十餘而寡苦節數年事姑極孝既削髮為尼道念甚堅募建綠波庵朝夕誦經時端身正坐如對佛天即平居自檢亦極嚴肅規行矩步不肯稍縱以姑老仍迎養庵中並勸勤持佛號作生西資糧不可放失餘景致成貽誤咸豐間粵賊至肩負姑以逃賊徧焚民居庵竟不燬亂定行持愈切姑先逝料理喪葬後無事不輕踰閫人有叩訪者應酬祇數言多則不答後年垂八十始化一六九清泰州曲塘報本庵尼素文傳素文名心一以字行泰州曲塘裴氏女在襁褓時不食葷辛父母鍾愛因而一家茹素年及笄將納婿文閉戶數日不出父母難之遂止一日屈膝合掌告父母曰女前身為僧受汝供養以情緣故投生為女今不願適人放我出家其父永度因無嗣唯一女不忍捨乃改宅為報本庵文遂削髮為尼既而勸父母受戒同修淨行嘗聞寧波育王舍利靈應與父母共詣鄮山設供營齋請塔令父觀之見鐘內懸一珠色如硨磲大如荳又令母觀之見一物黑似炭知為業障所結文即於塔前然指為母求懺詰旦復令觀之乃見鐘內綴金珠一顆大如梧子旁綴一白珠如椒粒文自見鐘內懸一珠如水晶大如彈丸光明如鏡旋至普陀梵音洞瞻禮大士又見好相既歸一意念佛後其父臨終遺命火化灰燼中獲舍利數十粒其母尋亦念佛而逝文善翰墨才高識遠不泥近跡常念女人多障身縱出家難光祖道遂革庵為僧收青年驅烏數人督課甚嚴既長使之參學叢林率皆成材而歸將示寂召諸僧謂曰勿圖我像勿立我位我愛道也是庵既歸汝等即以汝等為始汝等能顧庵之名各發勝心多行利濟則四恩總報三有均資能如是我願已足他何求焉言已而寂時年八十九同治某年二月初四日也一七清武進大成庵尼青蓮傳青蓮武進西郊某姓婦青年祝髮於大成庵精修梵行為遠近善信所欽敬咸豐十年賊陷常州尼著袈裟禮佛投入庵前池中及賊至則庵村悉成焦土越數日有汪邵二公潛歸探視見尼屍浮於池二公仰其懿德清操待夜深出其屍橐葬於庵之基越十有六年光緒改元邑人唐駝之父恂之公棄世駝母鄒恭人羅掘數十千購其葬所乃當日大成庵基村人欲賣地偷將尼骨埋於所購之墳地內堆一小塚鄒恭人詳究由來不惟不以為嫌且頗生敬仰每祭掃率駝兄弟兼祭尼墳至光緒二十八年鄒恭人亦棄世遂與恂之公合葬而駝兄弟服職外方二十餘年未共祭掃迨民國十年駝兄辭官歸里駝亦由滬回常相偕祭掃求尼墳而不得問其地主云以不便耕種乃移於桑田中矣駝與其兄光盛議曰現尚知此尼之德故有保護之念若不設法後難免夷墓暴骨之慘況汪邵二公冒險而偷葬吾母率吾兄弟年年致祭若置之不理不但有愧於汪邵二公且大得罪於吾母我等何可抱此遺憾乃擇吉移葬於其父母之塋又為建一石塔大書大成庵青蓮尼師之塔題其後曰尼服袈裟殉難其志行可想特遷遺骨葬我父母塋內唯願世人共相保護之駝之意子孫或有遷徙及與斷絕欲為久遠之計非求世人保護不可有以不合宜諫者駝曰此尼乃佛門真修行僧生為遠近所景仰賊欲來而服袈裟以自溺與古之仁人義士相去何遠況吾父母素所欽佩俾吾兄弟致祭今葬我父母塋內如請高僧於家供養有何不可又此尼具此懿德清操或已超凡入聖使吾父母常得親近當可蒙其慈力即得高超三界託質九蓮以故吾宗吾母之意而樂為之駝又持衣鉤徧求名人為之題讚印光法師撰唐氏先塋附青蓮尼塔發隱詳紀其事一七一清高郵觀音庵尼本蓮傳附緒修傳本蓮字理明秦郵人俗姓管幼茹素依小教場觀音庵緒修上人出家及長受戒於乾明寺歸則佐師襄理庵務性甚慈和善忍辱強憐兇惡多受其感化每日作務之餘密持大悲咒楞嚴咒心彌陀聖號以為恆課緒修極愛重之時宛平紅螺山瑞安法師為州牧魏默深所信敬促錫來郵創建永清蓮社修於六齋課畢即入方丈問道或移晷而後出輕薄者造蜚語謂與瑞公有染修無以自明對佛立誓曰我坐脫必以六月露尸五日必不腐臭若不然者我即有玷清規非佛弟子後果於盛夏圓寂坐尸五日面目如生酷暑蒸騰毫無穢氣五日中瞻仰膜拜者恆數百人無不嗟歎驚異前疑盡釋蓮自師寂後益勵苦行精進無間省節餘貲購室西屠肆建佛堂七間從此不聞半夜悲聲蓮嘗在佛前發願弟子逝後願幻軀不腐留勸後學光緒八年八月二十日示寂其徒奉龕三載循例荼毘舉火一晝夜龕頂未焦起視則端坐如生遐邇爭瞻靡不敬異爰擬裝金以留聖蹟時楚南陳清泰督水師駐秦輸金倡首州人丁逢辰襄蕆是舉工既竣飾以木冠城東有管嫗素與蓮善夢蓮苦冠壓首乞易去亟詣驗果然遂訂冬則紙冠夏則科首淮山孫硯畬撰碑誌之一七二清昆明永樂庵尼清法傳清法字寶月於昆明永樂庵披剃自幼精持戒律閉關拜華嚴經一部一字一拜晨昏扣鐘利濟幽冥五易寒暑中宵不輟晚歲專修淨土臨寂誦佛坐化咸豐元年也世壽七十三一七三清長沙鐵罏寺靈一傳靈一長沙吳氏女幼有善念不食腥血年二十一剃髮於縣中鐵罏寺未幾受具於南嶽祝聖精持律行日誦金剛彌陀諸經晚禮佛百拜誦佛萬聲以為常課至光緒二十七年辛丑自知日至如期坐化末後一偈有直往西天九品蓮之句
